name = "atlasit-mcp-idp"
main = "index.js"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for client registry
[[kv_namespaces]]
binding = "CLIENTS"
id = "9dac31a00856439e96a8ad5dfbf560fc"
preview_id = "9dac31a00856439e96a8ad5dfbf560fc"

[env.production]
route = "idp.atlasit.workers.dev/*"
usage_model = "bundled"

# SSL/TLS settings
[env.production.ssl]
mode = "strict"
min_version = "TLSv1.2"

# Observability
[env.production.logs]
enabled = true

# Rate limiting
[env.production.rate_limit]
requests = 100
period = 60

# Environment variables
[env.production.vars]
ENVIRONMENT = "production"
JWT_SECRET = ""            # wrangler secret put JWT_SECRET
MCP_MOBILE_SECRET = ""     # wrangler secret put MCP_MOBILE_SECRET 