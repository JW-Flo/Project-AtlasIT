name = "atlasit-adapter-github"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ADAPTER_NAME = "github"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"
OAUTH2_REDIRECT_URI = "https://adapter-github.atlasit.pro/auth/callback"

# Secrets (set via wrangler secret put):
# ADAPTER_SECRET - HMAC secret for inter-service webhook verification
# GITHUB_CLIENT_ID - OAuth2 client ID
# GITHUB_CLIENT_SECRET - OAuth2 client secret
# GITHUB_WEBHOOK_SECRET - GitHub org webhook signature secret
# EVENT_PUBLISH_SECRET - HMAC secret for signing outbound event publish calls to the orchestrator

[[d1_databases]]
binding = "DB"
database_name = "atlasit-shared"
database_id = "4c219864-76be-4453-a494-a4e0904e9cbc"

[observability.logs]
enabled = true

# Rate limit: 15 req/s
# Burst size: 30
