name = "atlasit-adapter-discord"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ADAPTER_NAME = "discord"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"
OAUTH2_REDIRECT_URI = "https://adapter-discord.atlasit.pro/auth/callback"

# Secrets (set via wrangler secret put):
# ADAPTER_SECRET - HMAC secret for webhook verification
# DISCORD_CLIENT_ID - OAuth2 client ID
# DISCORD_CLIENT_SECRET - OAuth2 client secret
# BOTTOKEN - Discord bot token for API access

[[d1_databases]]
binding = "DB"
database_name = "atlas-shared-db"
database_id = "" # Set per environment

[observability.logs]
enabled = true

# Rate limit: 5 req/s
# Burst size: 10
