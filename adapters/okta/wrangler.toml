name = "atlasit-okta-connector"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
CONNECTOR_ID = "okta"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"

[[d1_databases]]
binding = "DB"
database_name = "atlasit-shared"
database_id = "4c219864-76be-4453-a494-a4e0904e9cbc"

# Secrets (set via wrangler secret put):
# OKTA_API_TOKEN - Okta API token (SSWS)
# OKTA_ORG_URL - Okta org URL (e.g., https://company.okta.com)
# OKTA_WEBHOOK_SECRET - Secret for verifying Okta event hook Authorization header
# SCIM_API_TOKEN - Bearer token for SCIM 2.0 provisioning endpoints (configured in Okta SCIM app)

[observability.logs]
enabled = true
