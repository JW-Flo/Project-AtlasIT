name = "atlasit-adapter-azure"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ADAPTER_NAME = "azure"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"
OAUTH2_REDIRECT_URI = "https://adapter-azure.atlasit.pro/auth/callback"

# Secrets (set via wrangler secret put):
# ADAPTER_SECRET - HMAC secret for webhook verification
# AZURE_CLIENT_ID - OAuth2 client ID
# AZURE_CLIENT_SECRET - OAuth2 client secret

[[d1_databases]]
binding = "DB"
database_name = "atlas-shared-db"
database_id = "" # Set per environment

[observability.logs]
enabled = true

# Rate limit: 20 req/s
# Burst size: 40
