name = "atlasit-adapter-adp"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ADAPTER_NAME = "adp"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"
OAUTH2_REDIRECT_URI = "https://adapter-adp.atlasit.pro/auth/callback"

# Secrets (set via wrangler secret put):
# ADAPTER_SECRET - HMAC secret for webhook verification
# ADP_CLIENT_ID - OAuth2 client ID
# ADP_CLIENT_SECRET - OAuth2 client secret
# SSLCERT - Mutual TLS certificate provided by ADP for API authentication
# SSLKEY - Private key for mutual TLS authentication

[[d1_databases]]
binding = "DB"
database_name = "atlas-shared-db"
database_id = "" # Set per environment

[observability.logs]
enabled = true

# Rate limit: 5 req/s
# Burst size: 10
