name = "atlasit-adapter-datadog"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ADAPTER_NAME = "datadog"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"

# Secrets (set via wrangler secret put):
# ADAPTER_SECRET - HMAC secret for webhook verification
# DATADOG_API_KEY - API key for Datadog
# APPKEY - Datadog Application Key for management API access

[[d1_databases]]
binding = "DB"
database_name = "atlas-shared-db"
database_id = "" # Set per environment

[observability.logs]
enabled = true

# Rate limit: 5 req/s
# Burst size: 10
