name = "atlasit-adapter-slack"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ADAPTER_NAME = "slack"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"
OAUTH2_REDIRECT_URI = "https://adapter-slack.atlasit.pro/auth/callback"

# Secrets (set via wrangler secret put):
# ADAPTER_SECRET - HMAC secret for webhook verification (orchestrator → adapter)
# SLACK_CLIENT_ID - OAuth2 client ID
# SLACK_CLIENT_SECRET - OAuth2 client secret
# SLACK_SIGNING_SECRET - Slack request signing secret (for verifying inbound Slack webhooks)
# SLACK_BOT_TOKEN - Slack Bot User OAuth Token (xoxb-*) for sending messages

[[d1_databases]]
binding = "DB"
database_name = "atlasit-shared"
database_id = "4c219864-76be-4453-a494-a4e0904e9cbc"

[observability.logs]
enabled = true

# Rate limit: 1 req/s
# Burst size: 5
