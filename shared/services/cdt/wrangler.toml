name = "atlasit-cdt"
account_id = "620865722bd88ef0a77dbbb60c91392e"
main = "src/index.ts"
compatibility_date = "2025-10-03"
[vars]
LOG_LEVEL = "info"
SIGNING_SECRET = "dev-hmac"
ALLOWED_CLIENT_CERT_FPS = "" # comma-separated SHA256 base64 fingerprints (empty disables mTLS check)
[observability.logs]
enabled = true
# Bindings (to be created in CF account)
[[kv_namespaces]]
binding = "STATE_NS"
id = "STATE_NS_DEV"
[[kv_namespaces]]
binding = "IDEMP_NS"
id = "IDEMP_NS_DEV"
[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "atlasit-evidence-dev"
[[queues.producers]]
queue = "REMEDIATION_Q"
binding = "REMEDIATION_Q"
