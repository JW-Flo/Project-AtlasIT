openapi: 3.1.0
info:
  title: AtlasIT Compliance Digital Twin API
  version: 0.1.0
paths:
  /twin/event:
    post:
      operationId: postEvent
      responses: { "202": { description: Accepted } }
  /twin/control/{control_id}:
    get:
      parameters:
        - in: path
          name: control_id
          required: true
          schema: { type: string }
        - in: query
          name: tenant
          required: true
          schema: { type: string }
      responses: { "200": { description: OK } }
  /twin/controls:
    get:
      parameters:
        - in: query
          name: tenant
          required: true
          schema: { type: string }
        - in: query
          name: state
          required: false
          schema: { type: string, enum: [pass, fail, unknown, waived] }
      responses: { "200": { description: OK } }
  /twin/remediate/{control_id}:
    post:
      parameters:
        - in: path
          name: control_id
          required: true
          schema: { type: string }
      responses: { "202": { description: Enqueued } }
