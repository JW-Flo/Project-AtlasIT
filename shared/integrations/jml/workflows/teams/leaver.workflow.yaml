workflow:
  id: jml.leaver.teams.v1
  name: "Leaver - Offboarding (teams)"
  type: leaver
  version: 1.0.0
  enabled: true

trigger:
  source: hris
  event_types:
    - employee.terminated

inputs:
  required:
    - tenant_id
    - employee_id
    - user_id
  optional:
    - remove_group_ids

steps:
  - id: suspend_user
    type: action
    action_ref: atlas.connectors.teams.suspend_user

  - id: revoke_access
    type: action
    action_ref: atlas.connectors.teams.remove_from_group

  - id: delete_account
    type: action
    action_ref: atlas.connectors.teams.delete_user

success:
  result: pass
