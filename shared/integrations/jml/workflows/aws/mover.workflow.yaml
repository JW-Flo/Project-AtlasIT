workflow:
  id: jml.mover.aws.v1
  name: "Mover - Role and access change (aws)"
  type: mover
  version: 1.0.0
  enabled: true

trigger:
  source: hris
  event_types:
    - employee.updated

inputs:
  required:
    - tenant_id
    - employee_id
    - user_id
  optional:
    - department
    - title
    - from_role
    - to_role
    - from_department
    - to_department
    - from_groups
    - to_groups
    - from_systems
    - to_systems
    - add_group_ids
    - remove_group_ids

steps:
  - id: update_profile
    type: action
    action_ref: atlas.connectors.aws.update_user

  - id: remove_old_access
    type: action
    action_ref: atlas.connectors.aws.revoke_access

  - id: assign_new_access
    type: action
    action_ref: atlas.connectors.aws.add_to_group

success:
  result: pass
