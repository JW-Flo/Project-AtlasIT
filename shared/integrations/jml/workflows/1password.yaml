id: 1password
name: 1Password JML Workflow
description: Joiner/Mover/Leaver workflow for 1Password via SCIM Bridge

joiner:
  steps:
    - action: scim.createUser
      params:
        userName: "{{ user.email }}"
        displayName: "{{ user.displayName }}"
        emails:
          - value: "{{ user.email }}"
            type: work
            primary: true
    - action: api.addToGroup
      params:
        groupId: "{{ config.defaultGroupId }}"
        userId: "{{ steps[0].result.id }}"
      condition: "{{ config.defaultGroupId }}"

mover:
  steps:
    - action: api.updateGroupMembership
      params:
        userId: "{{ user.externalId }}"
        newGroups: "{{ user.groups }}"

leaver:
  steps:
    - action: api.suspendUser
      params:
        userId: "{{ user.externalId }}"
    - action: api.revokeVaultAccess
      params:
        userId: "{{ user.externalId }}"
    - action: api.removeFromAllGroups
      params:
        userId: "{{ user.externalId }}"
