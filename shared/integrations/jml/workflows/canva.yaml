id: canva
name: Canva JML Workflow
description: Joiner/Mover/Leaver workflow for Canva team

joiner:
  steps:
    - action: api.inviteTeamMember
      params:
        teamId: "{{ config.teamId }}"
        email: "{{ user.email }}"
        role: "{{ config.defaultRole | default: 'member' }}"

mover:
  steps:
    - action: api.updateTeamMember
      params:
        teamId: "{{ config.teamId }}"
        userId: "{{ user.externalId }}"
        role: "{{ user.role }}"

leaver:
  steps:
    - action: api.removeTeamMember
      params:
        teamId: "{{ config.teamId }}"
        userId: "{{ user.externalId }}"
