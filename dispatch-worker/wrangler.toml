name = "atlasit-dispatch"
account_id = "620865722bd88ef0a77dbbb60c91392e"
main = "src/index.ts"
compatibility_date = "2024-10-01"
workers_dev = true

# Bind the existing dispatch namespace (adjust namespace if different)
[[dispatch_namespaces]]
binding = "dispatcher"
namespace = "ignite-dispatcher-namespace"

# D1 for tenant and invocation metadata (reuse existing or create new)
[[d1_databases]]
binding = "ATLASIT_DB"
database_name = "atlasit-shared"
database_id = "4c219864-76be-4453-a494-a4e0904e9cbc" # provisioned via `wrangler d1 create atlasit-shared`

## KV (optional) for small metadata cache (removed placeholder to allow deploy)
# [[kv_namespaces]]
# binding = "TENANT_CACHE"
# id = "<real_kv_id>"

[vars]
LOG_LEVEL = "info"
