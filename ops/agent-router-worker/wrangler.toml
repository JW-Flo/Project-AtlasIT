name = "agent-router-worker"
main = "worker.ts"
compatibility_date = "2025-01-01"
workers_dev = true

# KV namespace for routing rules (optional - rules can also be bundled)
# [[kv_namespaces]]
# binding = "RULES_KV"
# id = "your-kv-namespace-id"

# Environment variables
# [env.production]
# GITHUB_TOKEN = "your-github-token"

# Build configuration
[build]
command = "npx esbuild worker.ts --bundle --format=esm --outfile=dist/worker.js"

# Node.js compatibility for crypto module
node_compat = true
