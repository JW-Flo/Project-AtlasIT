# FastAgent Secrets Configuration
# WARNING: Keep this file secure and never commit to version control

# Alternatively set OPENAI_API_KEY, ANTHROPIC_API_KEY or other environment variables. 
# Keys in the configuration file override environment variables.

openai:
    api_key: "<your-api-key-here>"  # Replace with your OpenAI API key
anthropic:
    api_key: "<your-api-key-here>"  # Replace with your Anthropic API key
deepseek:
    api_key: "<your-api-key-here>"  # Replace with your DeepSeek API key
openrouter:
    api_key: "<your-api-key-here>"  # Replace with your OpenRouter API key

# Example of setting an MCP Server environment variable
mcp:
    servers:
        brave:
            env:
                BRAVE_API_KEY: "<your_api_key_here>"  # Replace with your Brave API key
        orchestrator:
            env:
                ORCHESTRATOR_API_KEY: "<your_orchestrator_api_key_here>"  # Replace with your Orchestrator API key
        health:
            env:
                HEALTH_API_KEY: "<your_health_api_key_here>"  # Replace with your Health API key
