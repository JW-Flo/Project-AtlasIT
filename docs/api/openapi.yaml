openapi: 3.1.0
info:
  title: AtlasIT Platform API
  version: 1.0.0
  description: >-
    Core public-facing endpoints for compliance snapshots and (future) policy evaluation.
    Contract-first; additive evolution. All responses include `tenantId` when scoped.
servers:
  - url: https://atlasit-compliance-worker.example.workers.dev
    description: Compliance Worker (Production)
  - url: https://atlasit-compliance-staging.example.workers.dev
    description: Compliance Worker (Staging)
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          headers:
            X-Request-ID:
              schema: { type: string }
              description: Correlation identifier
          content:
            application/json:
              schema:
                type: object
                required: [status, service, timestamp, version]
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: compliance-worker }
                  timestamp: { type: number, format: int64 }
                  version: { type: string }
                  snapshotAgeSeconds:
                    type: integer
                    minimum: 0
                    nullable: true
                    description: Age in seconds of most recent persisted snapshot if available
                  d1:
                    type: boolean
                    description: Indicates whether D1 binding is configured
  /api/compliance/snapshot:
    get:
      summary: Get compliance snapshot
      description: Returns latest compliance snapshot for a tenant. May be cached for up to 300 seconds.
      parameters:
        - in: query
          name: tenantId
          schema: { type: string }
          required: false
          description: Explicit tenant scope (future multi-tenant). If omitted, defaults to authenticated tenant.
      responses:
        '200':
          description: Snapshot retrieved
          headers:
            X-Request-ID:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceSnapshot'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/policy/evaluate:
    post:
      summary: Evaluate policy pack (MVP placeholder)
      description: Deterministic evaluation returning decision and evidence hash. Future implementation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyEvaluationRequest'
      responses:
        '200':
          description: Evaluation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyEvaluationResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    ComplianceSnapshot:
      type: object
      required: [tenantId, generatedAt, frameworkSummary, risks, policies]
      properties:
        tenantId:
          type: string
          description: Tenant identifier
        generatedAt:
          type: string
          format: date-time
        ageSeconds:
          type: integer
          minimum: 0
          description: Age of persisted snapshot if stored (optional until Phase 2)
        frameworkSummary:
          type: array
          items:
            $ref: '#/components/schemas/FrameworkSummary'
        risks:
          type: array
          items:
            $ref: '#/components/schemas/Risk'
        policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
    FrameworkSummary:
      type: object
      required: [framework, coveragePercent, passing, failing, total]
      properties:
        framework: { type: string, example: SOC2 }
        coveragePercent: { type: number, minimum: 0, maximum: 100 }
        passing: { type: integer, minimum: 0 }
        failing: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 0 }
    Risk:
      type: object
      required: [id, title, likelihood, impact, score, severity]
      properties:
        id: { type: string }
        title: { type: string }
        likelihood: { type: integer, minimum: 1, maximum: 5 }
        impact: { type: integer, minimum: 1, maximum: 5 }
        score: { type: integer, minimum: 1, maximum: 25, description: 'likelihood * impact' }
        severity: { type: string, enum: [low, medium, high, critical] }
        owner: { type: string, format: email }
    Policy:
      type: object
      required: [id, name, status, updated]
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [draft, approved, outdated] }
        updated: { type: string, format: date-time }
    PolicyEvaluationRequest:
      type: object
      required: [tenantId, subject, policyPackRef, timestamp]
      properties:
        tenantId: { type: string }
        subject: { type: object, additionalProperties: true }
        policyPackRef: { type: string }
        timestamp: { type: string, format: date-time }
    PolicyEvaluationResponse:
      type: object
      required: [result, evidence]
      properties:
        result:
          type: object
          properties:
            allow: { type: boolean }
            requirements: { type: array, items: { type: string } }
            violations: { type: array, items: { type: string } }
        evidence:
          type: object
          required: [hash]
          properties:
            hash: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        requestId: { type: string }
