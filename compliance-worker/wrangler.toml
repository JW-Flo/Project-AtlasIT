name = "atlasit-compliance-worker"
main = "src/index.ts"
compatibility_date = "2025-09-30"
workers_dev = true
compatibility_flags = ["nodejs_compat"]
account_id = "620865722bd88ef0a77dbbb60c91392e"

[vars]
ORCHESTRATOR_URL = "https://ai-orchestrator.atlasit.pro"
ENVIRONMENT = "development"
ADAPTER_URLS = '{"github":"https://atlasit-github.workers.dev","okta":"https://atlasit-okta.workers.dev","google_workspace":"https://atlasit-google-workspace.workers.dev","microsoft_365":"https://atlasit-microsoft-365.workers.dev","aws":"https://atlasit-aws.workers.dev","slack":"https://atlasit-slack.workers.dev","adp":"https://atlasit-adp.workers.dev","auth0":"https://atlasit-auth0.workers.dev","azure":"https://atlasit-azure.workers.dev","bamboohr":"https://atlasit-bamboohr.workers.dev","crowdstrike":"https://atlasit-crowdstrike.workers.dev","discord":"https://atlasit-discord.workers.dev","gcp":"https://atlasit-gcp.workers.dev","quickbooks":"https://atlasit-quickbooks.workers.dev","stripe":"https://atlasit-stripe.workers.dev","teams":"https://atlasit-teams.workers.dev","workday":"https://atlasit-workday.workers.dev","xero":"https://atlasit-xero.workers.dev","zoom":"https://atlasit-zoom.workers.dev"}'
# WEBHOOK_SECRET — set via `wrangler secret put WEBHOOK_SECRET`

[[d1_databases]]
binding = "D1_COMPLIANCE"
database_name = "atlasit_compliance"
database_id = "25c2d388-8a76-4b8c-a594-21973239f0d5" # provisioned via wrangler d1 create

# ATLAS_SHARED_DB — shared database also used by ai-orchestrator and core-api.
# Compliance-worker reads compliance_evidence rows written by ai-orchestrator.
[[d1_databases]]
binding = "ATLAS_SHARED_DB"
database_name = "atlasit-shared"
database_id = "4c219864-76be-4453-a494-a4e0904e9cbc"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "atlasit-evidence"

[[kv_namespaces]]
binding = "API_TOKENS"
id = "3c5284c47e2e43dc8166fd53f2d35166"

# Secret bindings (set via `wrangler secret put GROQ_API_KEY`)
# GROQ_API_KEY — Groq API key for AI-powered policy generation

[observability.logs]
enabled = true

[env.dev]
name = "atlasit-compliance-worker-dev"
workers_dev = true

[env.dev.vars]
ENVIRONMENT = "development"
ORCHESTRATOR_URL = "http://localhost:8787"

[env.production]
name = "atlasit-compliance-worker"
workers_dev = true
routes = [
  "www.atlasit.pro/api/compliance/*",
  "compliance.atlasit.pro/*"
]

[env.production.vars]
ENVIRONMENT = "production"
ORCHESTRATOR_URL = "https://ai-orchestrator.atlasit.pro"
ADAPTER_URLS = '{"github":"https://atlasit-github.atlasit.pro","okta":"https://atlasit-okta.atlasit.pro","google_workspace":"https://atlasit-google-workspace.atlasit.pro","microsoft_365":"https://atlasit-microsoft-365.atlasit.pro","aws":"https://atlasit-aws.atlasit.pro","slack":"https://atlasit-slack.atlasit.pro","adp":"https://atlasit-adp.atlasit.pro","auth0":"https://atlasit-auth0.atlasit.pro","azure":"https://atlasit-azure.atlasit.pro","bamboohr":"https://atlasit-bamboohr.atlasit.pro","crowdstrike":"https://atlasit-crowdstrike.atlasit.pro","discord":"https://atlasit-discord.atlasit.pro","gcp":"https://atlasit-gcp.atlasit.pro","quickbooks":"https://atlasit-quickbooks.atlasit.pro","stripe":"https://atlasit-stripe.atlasit.pro","teams":"https://atlasit-teams.atlasit.pro","workday":"https://atlasit-workday.atlasit.pro","xero":"https://atlasit-xero.atlasit.pro","zoom":"https://atlasit-zoom.atlasit.pro"}'

[[env.production.d1_databases]]
binding = "D1_COMPLIANCE"
database_name = "atlasit_compliance"
database_id = "25c2d388-8a76-4b8c-a594-21973239f0d5"

[[env.production.d1_databases]]
binding = "ATLAS_SHARED_DB"
database_name = "atlasit-shared"
database_id = "4c219864-76be-4453-a494-a4e0904e9cbc"

[[env.production.r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "atlasit-evidence"

[[env.production.kv_namespaces]]
binding = "API_TOKENS"
id = "3c5284c47e2e43dc8166fd53f2d35166"

[env.production.observability.logs]
enabled = true
