name = "atlasit-onboarding-dev"
main = "src/index.ts"
compatibility_date = "2024-02-15"

[vars]
ENVIRONMENT = "development"

[[kv_namespaces]]
binding = "STATE"
id = "test-state-id"
preview_id = "test-state-preview-id"

[[d1_databases]]
binding = "DB"
database_name = "atlasit-dev"
database_id = "test-db-id"

[env.staging]
name = "atlasit-onboarding-staging"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "atlasit-onboarding-prod"
vars = { ENVIRONMENT = "production" }
