<!doctype html>
<html lang="en" class="h-full" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>AtlasIT Console</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script>
      // Blocking theme init — prevents white flash (FOUC) on page load.
      // Reads localStorage before first paint and sets data-theme + .dark class
      // so both CSS custom properties and Tailwind dark: utilities work immediately.
      (function() {
        var t = 'dark';
        try { var s = localStorage.getItem('atlasit.theme'); if (s === 'light' || s === 'dark') t = s; } catch(e) {}
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      })();

      // Static SPA mode: intercept SvelteKit __data.json fetches (no server data in static bundle)
      // Must run before SvelteKit bundle bootstraps.
      (function() {
        var _fetch = window.fetch.bind(window);
        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : (input instanceof URL ? input.href : (input && input.url) || '');
          if (url.indexOf('__data.json') !== -1) {
            return Promise.resolve(new Response(
              JSON.stringify({ type: 'data', nodes: [null, null, null] }),
              { status: 200, headers: { 'content-type': 'application/json' } }
            ));
          }
          return _fetch(input, init);
        };
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full bg-background text-foreground">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
