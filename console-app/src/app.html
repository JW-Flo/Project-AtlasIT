<!doctype html>
<html lang="en" class="h-full" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>AtlasIT Console</title>
    <script>
      // Blocking theme init — prevents white flash (FOUC) on page load.
      // Reads localStorage before first paint and sets data-theme so CSS
      // custom properties from app.css take effect immediately.
      (function() {
        var t = 'dark';
        try { var s = localStorage.getItem('atlasit.theme'); if (s === 'light' || s === 'dark') t = s; } catch(e) {}
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full bg-background text-foreground">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
