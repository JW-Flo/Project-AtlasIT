name = "atlasit-console"
# IMPORTANT: replace with your real Cloudflare account ID before deploy
account_id = "__REPLACE_ACCOUNT_ID__"
main = "src/worker-entry.ts" # wrapper entry that imports built SvelteKit worker
compatibility_date = "2025-09-27"
workers_dev = true

# Optional: uncomment and set a custom route/zone once you map to a domain
# zone_id = "__REPLACE_ZONE_ID__"
# routes = ["console.example.com/*"]

[build]
command = "npm run build"

[vars]
APP_NAME = "AtlasIT Console"

[observability]
enabled = true

# --- Resource Bindings (placeholders; populate real IDs/names before deploy) ---

[[d1_databases]]
binding = "ATLAS_CORE_DB"        # Access via env.ATLAS_CORE_DB
database_name = "atlas_core_db"  # Cloudflare D1 database name
database_id = "00000000-0000-0000-0000-000000000000" # REPLACE: wrangler d1 list

[[d1_databases]]
binding = "ATLAS_AUDIT_DB"
database_name = "atlas_audit_db"
database_id = "00000000-0000-0000-0000-000000000001"

[[d1_databases]]
binding = "D1_COMPLIANCE"
database_name = "atlas_compliance"
database_id = "00000000-0000-0000-0000-000000000010"

[[d1_databases]]
binding = "D1_AUDIT"
database_name = "atlas_audit_shadow"
database_id = "00000000-0000-0000-0000-000000000011"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "00000000000000000000000000000000" # REPLACE: wrangler kv:namespace create KV_SESSIONS

[[kv_namespaces]]
binding = "KV_CACHE"
id = "00000000000000000000000000000001"

[[kv_namespaces]]
binding = "KV_FEATURE_FLAGS"
id = "00000000000000000000000000000002"

[[r2_buckets]]
binding = "R2_POLICIES"
bucket_name = "atlas-policies"

[[r2_buckets]]
binding = "R2_EVIDENCE"
bucket_name = "atlas-evidence"

[[r2_buckets]]
binding = "R2_ARTIFACTS"
bucket_name = "atlas-artifacts"

[[analytics_engine_datasets]]
binding = "ANALYTICS_EVENTS"
dataset = "atlas_events"

[[analytics_engine_datasets]]
binding = "ANALYTICS_METRICS"
dataset = "atlas_metrics"

[[queues.producers]]
binding = "WORKFLOW_QUEUE"
queue = "atlas-workflow-queue"

[[queues.producers]]
binding = "Q_POLICY_REBUILD"
queue = "policy-rebuild"

[[queues.producers]]
binding = "Q_RISK_RECALC"
queue = "risk-recalc"

# Optional: durable objects (example placeholder)
#[[durable_objects.bindings]]
#name = "SESSION_DO"
#class_name = "SessionDurableObject"

# -----------------------------------------------------------------------------
