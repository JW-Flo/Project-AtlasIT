[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# Build is handled by CI workflow steps (build:shared then console build).
# Do not add a [build] command here — wrangler runs it from the repo root
# which triggers npm-run-all build:* and creates an infinite loop.

[vars]
APP_NAME = "AtlasIT Console"
COMPLIANCE_BASE = "https://compliance.atlasit.pro/api/compliance"
CORE_API_BASE = "https://api.atlasit.pro"
DISPATCH_BASE = "https://dispatch.atlasit.pro"
ORCHESTRATOR_BASE = "https://orchestrator.atlasit.pro"
ORCHESTRATOR_URL = "https://orchestrator.atlasit.pro"
SUPER_ADMIN_EMAIL = "joe.whittle@atlasit.app"
TENANT_ID = "atlasit"
DEMO_MODE = "false"
DEMO_SEEDED_EMAIL = "demo@atlasit.pro"
DEMO_TENANT_ID = "demo-acme-dental"
DEMO_TENANT_NAME = "Acme Dental Group"
# Secret bindings (set via `wrangler secret put <KEY> --name atlasit-console`):
# DEMO_SEEDED_PASSWORD — Demo login password (required when DEMO_MODE=true)
# GROQ_API_KEY — Required for NL automation rule builder and AI features
# STRIPE_SECRET_KEY — Stripe secret key for billing/checkout (1Password: "Stripe - AtlasIT")
# STRIPE_PUBLISHABLE_KEY — Stripe publishable key for client-side checkout
# STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret
# STRIPE_PRICE_STARTER_MONTHLY — Stripe price ID for Starter monthly
# STRIPE_PRICE_STARTER_ANNUAL — Stripe price ID for Starter annual
# STRIPE_PRICE_PROFESSIONAL_MONTHLY — Stripe price ID for Professional monthly
# STRIPE_PRICE_PROFESSIONAL_ANNUAL — Stripe price ID for Professional annual
# DEV_AUTH_BYPASS must NEVER be set here — only in local dev env vars alongside NODE_ENV=development

[observability]
enabled = true

[triggers]
# Disabled — duties migrated to AWS EventBridge (PR #532+)
crons = []

# --- Resource bindings ---
[[d1_databases]]
binding = "ATLAS_SHARED_DB"
database_name = "atlasit-shared"
database_id = "4c219864-76be-4453-a494-a4e0904e9cbc"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "c3017a1a156a4f2fa2da62dadc714c44"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "4f08086308004796bfd7cab01c34b006"

[[services]]
binding = "COMPLIANCE_WORKER"
service = "atlasit-compliance-worker"

[[services]]
binding = "MARKETPLACE_WORKER"
service = "atlasit-marketplace"

[[services]]
binding = "EMAIL_WORKER"
service = "atlasit-email-worker"
