sonar.projectKey=Project-AtlasIT
sonar.projectName=Project AtlasIT
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000
# For local SonarQube; remove organization requirement
# Set SONAR_TOKEN in environment if auth required (Create user token in local UI)
sonar.login=${env.SONAR_TOKEN}

# Aggregate JS/TS + Python + misc
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.svelte-kit/**,**/vendor/**,**/tests/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/*.test.js,**/docs/cloudflare/**

# Coverage placeholders (populate via CI if available)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.python.coverage.reportPaths=coverage/coverage.xml

# Narrow test files for clarity
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.js
