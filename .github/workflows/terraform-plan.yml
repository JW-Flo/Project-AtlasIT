name: Terraform Plan

on:
  pull_request:
    paths:
      - 'infra/**'
  workflow_dispatch:

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Terraform Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: latest

      - name: Init TFLint plugins
        run: tflint --init --config infra/.tflint.hcl
        working-directory: infra/aws

      - name: Run TFLint (AWS)
        run: tflint --config ../.tflint.hcl --format compact
        working-directory: infra/aws
        continue-on-error: true

      - name: Run TFLint (Cloudflare dispatch)
        run: tflint --format compact
        working-directory: infra/terraform/dispatch
        continue-on-error: true

      # tfsec is archived upstream; replaced by structural lint above. Add
      # Trivy config scan here if we later want IaC security scanning.

  plan:
    name: Terraform Plan
    needs: [lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/aws

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.0
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=dev.tfvars -no-color -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/aws/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const body = `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1
