name: Terraform Drift Detection

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform-drift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (drift detection)
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_core_api_worker_content: "// populated by build pipeline"
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -no-color -out=tfplan
          code=$?
          set -e
          if [ "$code" -eq 1 ]; then
            echo "Terraform plan failed" >&2
            exit 1
          fi
          if [ "$code" -eq 2 ]; then
            echo "Unexpected infrastructure drift detected in ${{ matrix.environment }}" >&2
            exit 1
          fi
