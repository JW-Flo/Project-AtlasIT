name: Auto-Plan Ignite

on:
  push:
    paths:
      - 'mcp/**'
      - '.github/workflows/auto-plan.yml'
      - 'services/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci

      - name: Bundle context & call OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PAYLOAD="$(node mcp/flat-bundle.js)"
          SYS_ESC="$(printf '%s' "$PAYLOAD" | jq -r '.system' | jq -R .)"
          USR_ESC="$(printf '%s' "$PAYLOAD" | jq -r '.project' | jq -R .)"
          curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o\",
              \"messages\": [
                {\"role\": \"system\", \"content\": $SYS_ESC},
                {\"role\": \"user\",   \"content\": $USR_ESC}
              ]
            }" | jq -r '.choices[0].message.content' > ci/plan.md

      - name: Commit updated plan
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: regenerate plan via Copilot"
          file_pattern: ci/plan.md
