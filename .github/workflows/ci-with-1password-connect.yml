name: CI with 1Password Connect (recommended)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build using 1Password Connect
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      # This workflow demonstrates using a 1Password Connect server. Configure the Connect server
      # host and token in GitHub Secrets: OP_CONNECT_HOST and OP_CONNECT_TOKEN.
      - name: Load secrets from 1Password Connect
        uses: 1Password/load-secrets-action@v3
        with:
          export-env: |
            DATABASE_URL=op://vault/My App DB/password
            API_KEY=op://vault/My App/API Key/password
        env:
          # Use the repository secret created for Atlas_IT. This secret should have minimal permissions
          # (read access to the required vaults) and be rotated regularly.
          OP_CONNECT_HOST: "${{ secrets.OP_CONNECT_HOST }}"
          # Token stored as both GitHub repo secret and runner env secret under
          # the name `op_atlas_it_connect_server_pat`. Expires: 2026-02-15T23:59:59Z.
          # Scoped (for documentation) to read/write this repo and the Connect server.
          OP_CONNECT_TOKEN: "${{ secrets.op_atlas_it_connect_server_pat }}"

      - name: Use the secrets (example)
        run: |
          echo "DB var (masked): ${DATABASE_URL::8}***"
          echo "API_KEY length: ${#API_KEY}"

      - name: Quick token verification (optional)
        env:
          OP_CONNECT_HOST: "${{ secrets.OP_CONNECT_HOST }}"
          OP_CONNECT_TOKEN: "${{ secrets.op_atlas_it_connect_server_pat }}"
        run: |
          # Skip if the required secrets aren't defined in the repo/environment
          if [ -z "${OP_CONNECT_HOST:-}" ] || [ -z "${OP_CONNECT_TOKEN:-}" ]; then
            echo "Skipping Connect verification: required secrets not set"
            exit 0
          fi
          echo "Verifying access to Connect host"
          set -euo pipefail
          # Attempt a simple GET to the Connect /v1/vaults endpoint to confirm connectivity.
          curl -sS -H "Authorization: Bearer $OP_CONNECT_TOKEN" "$OP_CONNECT_HOST/v1/vaults" | jq -r '.[]?.name' || true

      - name: Install dependencies
        run: npm ci

      - name: Run lints and tests
        run: |
          npm run lint --if-present
          npm test --if-present

# OIDC notes (optional / advanced):
# - If your 1Password deployment supports OIDC or short-lived tokens via an identity provider, you can
#   exchange the GitHub Actions OIDC token for a short-lived 1Password Connect token instead of storing
#   OP_CONNECT_TOKEN as a long-lived secret. The exchange is specific to your Connect deployment and
#   identity provider configuration. Example (pseudo-steps):
#   1) Request the GitHub OIDC token:
#        echo "Requesting OIDC token"
#        ID_TOKEN=$(curl -s --request POST "https://vstoken.actions.githubusercontent.com/..." ...)
#   2) Exchange the ID_TOKEN with 1Password Connect (your Connect deployment must support the exchange):
#        curl -s -X POST "$OP_CONNECT_HOST/v1/auth/exchange" -H "Content-Type: application/json" -d '{"id_token":"'"$ID_TOKEN"'"}'
#   3) Use the returned short-lived token for the `load-secrets-action` or direct API calls.
# - Consult your 1Password Connect deployment docs and your security team before enabling an OIDC flow.
