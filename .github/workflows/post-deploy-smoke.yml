name: Post Deploy Smoke

on:
    workflow_dispatch:

jobs:
    smoke:
        name: Smoke ${{ matrix.target.name }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                target:
                    - name: workers-dev
                      base: https://atlasit-compliance-worker.kd8jc7v8cd.workers.dev
                    - name: production
                      base: https://www.atlasit.pro
        steps:
            - name: Hit health endpoint
              run: |
                  BASE="${{ matrix.target.base }}"
                  echo "Testing $BASE"
                  curl -fsS "$BASE/health" | jq '.status'
            - name: Snapshot GET + HEAD
              run: |
                  BASE="${{ matrix.target.base }}"
                  curl -fsS "$BASE/api/compliance/snapshot?tenantId=smoke"
                  curl -fsSI "$BASE/api/compliance/snapshot" | grep -i "strict-transport-security"
            - name: Evidence search probe
              run: |
                  BASE="${{ matrix.target.base }}"
                  curl -fsS "$BASE/api/evidence/search?tenantId=demo&limit=1"
