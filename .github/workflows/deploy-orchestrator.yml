name: Deploy Orchestrator Worker

on:
    push:
        branches: [main]
        paths:
            - "ai-orchestrator/**"
            - "packages/shared/**"
            - ".github/workflows/deploy-orchestrator.yml"
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm

            - name: Install deps (root)
              run: npm ci

            - name: Lint orchestrator
              run: |
                  npx eslint ai-orchestrator --max-warnings=0 || \
                    npx eslint ai-orchestrator

            - name: Run tests (if present)
              run: |
                  if [ -f "package.json" ] && \
                     jq -e '.scripts.test' package.json > /dev/null; then
                    npm test --workspaces --if-present || \
                      echo "No tests or tests failed"
                  fi

            - name: Deploy orchestrator
              run: npx wrangler deploy --config ai-orchestrator/wrangler.toml

            - name: Post-deploy smoke test
              run: |
                  echo "Probing orchestrator.atlasit.pro/health..."
                  curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
                    "https://orchestrator.atlasit.pro/health" || echo "unreachable"
              if: always()
