name: Secret Scanning (Gitleaks)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          ARGS="--config .gitleaks.toml --verbose"

          # Handle initial push (before = all zeros)
          if echo "$BASE" | grep -qE '^0+$'; then
            gitleaks detect --source . $ARGS
          else
            gitleaks detect --source . --log-opts="${BASE}..${HEAD}" $ARGS
          fi

      - name: Run project secret scanner
        run: node scripts/scan-secrets.js
