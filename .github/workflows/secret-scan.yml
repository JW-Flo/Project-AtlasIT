name: Secret Scanning (Gitleaks)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine scan range
        id: scan-range
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Handle initial push (before = all zeros)
          if echo "$BASE" | grep -qE '^0+$'; then
            echo "log_opts=" >> "$GITHUB_OUTPUT"
          else
            echo "log_opts=${BASE}..${HEAD}" >> "$GITHUB_OUTPUT"
          fi

      - uses: gitleaks/gitleaks-action@44c470ffc35caa8b1eb3e8012ca53c2f9bea4eb5 # v2.3.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: ${{ steps.scan-range.outputs.log_opts && format('--log-opts="{0}"', steps.scan-range.outputs.log_opts) || '' }}

      - name: Run project secret scanner
        run: node scripts/scan-secrets.js
