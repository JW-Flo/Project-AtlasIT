name: auth-smoke

on:
  workflow_dispatch:
  deployment_status:

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Determine base URL
        id: base
        run: |
          if [ -n "${{ github.event.deployment_status.environment_url }}" ]; then
            echo "url=${{ github.event.deployment_status.environment_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${BASE_URL:-http://localhost:8787}" >> $GITHUB_OUTPUT
          fi
      - name: Run auth smoke
        run: bash ops/checks/auth-smoke.sh "${{ steps.base.outputs.url }}"
      - name: Upload smoke log (on failure)
        if: failure()
        run: echo "Auth smoke failed against ${{ steps.base.outputs.url }}"
