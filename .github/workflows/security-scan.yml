name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    name: Snyk dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Snyk test
        uses: snyk/actions/node@b98d498629f1c368650224d6d212bf7dfa89e4bf # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects
      - name: pnpm audit (fallback)
        if: always()
        run: pnpm audit --prod --audit-level=high || true

  zap-baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0 # TODO: pin to SHA once stable release is available
        with:
          target: "https://www.atlasit.pro"
          allow_issue_writing: false
          cmd_options: "-a -j"
