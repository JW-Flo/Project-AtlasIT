name: Contract Gate

on:
  pull_request:
    paths:
      - docs/api/openapi.yaml
      - docs/api/CHANGELOG.md
      - .github/workflows/contract-gate.yml

jobs:
  verify-openapi-changelog:
    name: Ensure OpenAPI changes are changelogged
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Validate changelog paired with OpenAPI
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          OPENAPI_CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- docs/api/openapi.yaml | wc -l | tr -d ' ')
          if [ "$OPENAPI_CHANGED" = "0" ]; then
            echo "No OpenAPI changes detected. Skipping gate."
            exit 0
          fi
          CHANGELOG_CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- docs/api/CHANGELOG.md | wc -l | tr -d ' ')
          if [ "$CHANGELOG_CHANGED" = "0" ]; then
            echo "::error ::docs/api/openapi.yaml changed but docs/api/CHANGELOG.md was not updated."
            exit 1
          fi
          echo "OpenAPI spec and changelog updated together."
