name: Deploy Cloudflare AI Worker

on:
  push:
    branches: [main]

jobs:
  deploy-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Wrangler (if not cached)
        run: |
          npm uninstall -g @cloudflare/wrangler && npm install -g wrangler

      - name: Authenticate Wrangler
        run: echo "${{ secrets.WRANGLER_API_TOKEN }}" | wrangler login

      - name: Sync AI secrets to Cloudflare
        run: |
          echo "${{ secrets.AI_GATEWAY_TOKEN }}" | npx wrangler secret put AI_GATEWAY_TOKEN --env ai --yes
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}

      - name: Publish AI Worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
        run: npx wrangler publish --env ai

      - name: Smoke test AI Worker
        env:
          AI_WORKER_URL: "https://ai-project-ignite.kd8jc7v8cd.workers.dev"
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
        run: ./scripts/smoke-test-ai-worker.sh

      - name: Log success
        if: success()
        run: echo "✅ AI Worker deployed and tested successfully."

      - name: Log failure
        if: failure()
        run: echo "❌ AI Worker deployment or testing failed. Check logs for details."

      - name: Success message
        if: success()
        run: echo '✅ AI Worker deployed and tested'
