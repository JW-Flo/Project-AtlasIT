name: CI with 1Password Connect (OIDC exchange)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Request permission to mint OIDC tokens from GitHub Actions
permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build with OIDC token exchange
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      # Step: request an OIDC identity token from GitHub. The exact method to fetch the token
      # varies; many projects use a small action or curl against the GitHub OIDC endpoint.
      # We capture it into an output named id_token for the exchange step below.
      - name: Request OIDC ID token
        id: get_id_token
        # This is a placeholder step. Replace with your preferred method/action that requests
        # an OIDC token and exposes it as an output named `id_token`.
        run: |
          echo "This step must be replaced with a real OIDC token request."
          echo "id_token=REPLACE_WITH_ID_TOKEN" >> $GITHUB_OUTPUT

      # Step: exchange the GitHub OIDC token for a short-lived 1Password Connect token.
      # Your Connect deployment (or an identity gateway in front of it) must expose an endpoint
      # that accepts the GitHub ID token and returns a short-lived Connect token.
      - name: Exchange OIDC token for Connect token
        id: exchange
        env:
          CONNECT_HOST: "${{ secrets.OP_CONNECT_HOST }}"
        run: |
          set -euo pipefail
          if [ -z "${CONNECT_HOST:-}" ]; then
            echo "OP_CONNECT_HOST secret is not set, cannot exchange token" >&2
            exit 1
          fi
          # NOTE: replace the curl URL and payload with your Connect exchange endpoint details.
          echo "Exchanging id token with Connect host: $CONNECT_HOST"
          ID_TOKEN="${{ steps.get_id_token.outputs.id_token }}"
          # Example (pseudo):
          # curl -sS -X POST "$CONNECT_HOST/v1/auth/exchange" \
          #   -H "Content-Type: application/json" \
          #   -d '{"id_token":"'"$ID_TOKEN"'"}' \
          #   | jq -r '.token' > /tmp/connect_token
          echo "connect_token=REPLACE_WITH_CONNECT_TOKEN" >> $GITHUB_OUTPUT

      # Use the returned Connect token for the load-secrets-action (short-lived token)
      - name: Load secrets using short-lived Connect token
        uses: 1Password/load-secrets-action@v3
        with:
          export-env: |
            DATABASE_URL=op://vault/My App DB/password
            API_KEY=op://vault/My App/API Key/password
        env:
          OP_CONNECT_HOST: "${{ secrets.OP_CONNECT_HOST }}"
          # Connect token provided by the exchange step
          OP_CONNECT_TOKEN: ${{ steps.exchange.outputs.connect_token }}

      - name: Install dependencies
        run: npm ci

      - name: Run test/lint
        run: |
          npm run lint --if-present
          npm test --if-present

# Notes:
# - The above workflow is a template: the OIDC request and Connect exchange steps are placeholders
#   that must be implemented for your Connect deployment. Many organizations implement a small
#   identity gateway that validates the GitHub OIDC token audience and issues a short-lived Connect token.
# - Set `permissions.id-token: write` at the job or workflow level so GitHub will mint ID tokens for Actions.
# - For security, your exchange endpoint should validate the OIDC token audience, issuer, and claims before
#   issuing a Connect token and should limit scope to the minimal vaults required.
