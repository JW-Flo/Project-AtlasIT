name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14.x, 16.x]
        python-version: [3.8, 3.9, 3.10]
    steps:
      - uses: actions/checkout@v2
      
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install Node.js Dependencies
        run: npm ci
      
      - name: Run Lint
        run: npm run lint
      
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Python Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
      
      - name: Run Tests
        run: pytest

  run-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run AI Agent
        run: |
          python scripts/run_ai_agent.py

      - name: Continuous QA Checks
        run: |
          checkov --directory terraform
          tfsec terraform
          tflint terraform
          pytest

      - name: Retry on Failure
        if: failure()
        run: |
          echo "Retrying failed steps..."
          # Add retry logic here

      - name: Notify on Failure
        if: failure()
        run: |
          echo "CI/CD pipeline failed. Notifying team..."
          curl -X POST -H 'Content-type: application/json' --data '{"text":"CI/CD pipeline failed."}' $SLACK_WEBHOOK_URL

      - name: Notify on Success
        if: success()
        run: |
          echo "CI/CD pipeline completed successfully."
          curl -X POST -H 'Content-type: application/json' --data '{"text":"CI/CD pipeline completed successfully."}' $SLACK_WEBHOOK_URL
