name: Perf Budgets

on:
  pull_request:
    paths:
      - console-app/**
      - scripts/bundle-report.mjs
      - .github/workflows/perf-budgets.yml
      - ops/perf/bundle-baseline.json
      - package.json
      - package-lock.json

jobs:
  check-bundles:
    name: Enforce bundle size guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build console bundle
        run: npm run build:console
      - name: Generate bundle report
        run: node scripts/bundle-report.mjs console-app/dist > bundle-report.json
      - name: Compare bundle metrics to baseline
        env:
          THRESHOLD: "1.0"
        run: |
          CURRENT_LARGEST=$(jq '.largest.bytes' bundle-report.json)
          CURRENT_TOTAL=$(jq '.total' bundle-report.json)
          BASE_LARGEST=$(jq '.largestBytes' ops/perf/bundle-baseline.json)
          BASE_TOTAL=$(jq '.totalBytes' ops/perf/bundle-baseline.json)
          echo "Current largest asset bytes: $CURRENT_LARGEST"
          echo "Current total bundle bytes: $CURRENT_TOTAL"
          python - <<'PY'
import os, sys
current_largest = float(os.environ["CURRENT_LARGEST"])
current_total = float(os.environ["CURRENT_TOTAL"])
base_largest = float(os.environ["BASE_LARGEST"])
base_total = float(os.environ["BASE_TOTAL"])
threshold = float(os.environ.get("THRESHOLD", "1.0"))
failed = False
if current_largest > base_largest * threshold:
    print(f"Largest asset {current_largest} exceeds baseline {base_largest} * {threshold}", file=sys.stderr)
    failed = True
if current_total > base_total * threshold:
    print(f"Total bundle {current_total} exceeds baseline {base_total} * {threshold}", file=sys.stderr)
    failed = True
sys.exit(1 if failed else 0)
PY
