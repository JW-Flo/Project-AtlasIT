name: CI with 1Password

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test (uses 1Password secrets)
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      # Load secrets using the official 1Password GitHub Action.
      # This example shows the Service Account (automation token) flow. Prefer 1Password Connect
      # (OP_CONNECT_HOST + OP_CONNECT_TOKEN) for ephemeral/rotated access where possible.
      - name: Load secrets from 1Password (DEPRECATED)
        # Historical example showing the service account token flow. Prefer the
        # Connect-based pattern (OP_CONNECT_HOST + op_atlas_it_connect_server_pat)
        # or the OIDC exchange template in .github/workflows/ci-with-1password-oidc.yml.
        uses: 1Password/load-secrets-action@v3
        with:
          # Map 1Password items to environment variables. See the action README for mapping options.
          export-env: |
            DATABASE_URL=op://vault/My App DB/password
            API_KEY=op://vault/My App/API Key/password
        env:
          # OP_SERVICE_ACCOUNT_TOKEN is deprecated in this repository. If you are a small
          # team that must use a service account token, set `secrets.OP_SERVICE_ACCOUNT_TOKEN`
          # in your fork/environment. Otherwise prefer Connect or OIDC.
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      # Alternative: 1Password Connect server (recommended for production). Uncomment and configure:
      # - name: Load secrets from 1Password Connect
      #   uses: 1Password/load-secrets-action@v3
      #   with:
      #     export-env: |
      #       DATABASE_URL=op://vault/My App DB/password
      #       API_KEY=op://vault/My App/API Key/password
      #   env:
      #     OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
      #     OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Show loaded secrets (masked)
        run: |
          echo "DB var (masked): ${DATABASE_URL::8}***"
          echo "API_KEY length: ${#API_KEY}"

      - name: Install dependencies
        run: npm ci

      - name: Run lints and tests
        run: |
          npm run lint --if-present
          npm test --if-present

      - name: Build (example)
        run: npm run build --if-present

      # Optional: manual op binary install (only needed if you want to use the op CLI directly). Keep
      # commented unless you specifically need the CLI. Windows runner differences may apply.
      # - name: Install 1Password CLI (optional)
      #   run: |
      #     sudo apt-get update && sudo apt-get install -y unzip
      #     ARCH=$(uname -m)
      #     case "$ARCH" in
      #       x86_64) ARCH=amd64 ;;
      #       aarch64|arm64) ARCH=arm64 ;;
      #       *) echo "Unsupported arch: $ARCH"; exit 1 ;;
      #     esac
      #     TAG=$(curl -sS https://api.github.com/repos/1Password/op/releases/latest | grep -Po '"tag_name": "\\K.*?(?=\")' || true)
      #     if [ -z "$TAG" ]; then TAG=v2.23.1; fi
      #     VER=${TAG#v}
      #     ZIPURL="https://github.com/1Password/op/releases/download/${TAG}/op_linux_${ARCH}_${VER}.zip"
      #     curl -sSLo /tmp/op.zip "$ZIPURL"
      #     unzip -o /tmp/op.zip -d /tmp/op
      #     sudo install -m 0755 /tmp/op/op /usr/local/bin/op
# Notes:
# - Using 1Password Connect (if available) is the most secure pattern for CI: it avoids long-lived tokens
#   in GitHub Secrets and supports fine-grained access. The service account token approach works well for
#   smaller teams but requires rotation and secure storage of OP_SERVICE_ACCOUNT_TOKEN.
# - The `load-secrets-action` handles mapping 1Password items to environment variables — read its README for
#   advanced usage (templating, JSON parsing, nested fields).
# - Windows runners: if you use the manual `op` CLI install, test the steps on windows-latest separately; the
#   action itself supports Connect/service account methods cross-platform.
