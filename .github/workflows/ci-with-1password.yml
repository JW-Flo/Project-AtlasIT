name: CI with 1Password

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install 1Password CLI
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          curl -sS https://cache.agilebits.com/dist/1P/op2/pkg/v2.14.0/op_linux_amd64_v2.14.0.zip -o /tmp/op.zip
          unzip /tmp/op.zip -d /tmp/op && sudo mv /tmp/op/op /usr/local/bin/op

      - name: Sign in to 1Password (service account)
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "OP_SERVICE_ACCOUNT_TOKEN is missing" >&2
            exit 1
          fi
          # Use the token to sign in. Adjust region/account parameters as needed.
          echo "$OP_SERVICE_ACCOUNT_TOKEN" | op signin --raw > /tmp/op_session || true
          export OP_SESSION=$(cat /tmp/op_session 2>/dev/null || true)

      - name: Read mapped secrets
        env:
          OP_SESSION: ${{ env.OP_SESSION }}
        run: |
          chmod +x ops/secrets/op-inject.sh
          source ops/secrets/op-inject.sh

      - name: Run lint (example)
        run: npm run lint
