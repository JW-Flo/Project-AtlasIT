name: CI with 1Password

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and test (uses 1Password secrets)
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      # Load secrets using the 1Password GitHub Action (automation token pattern).
      # For cost-free bootstrap on GitHub Actions, store OP_SERVICE_ACCOUNT_TOKEN in repo secrets.
      # Prefer 1Password Connect (OP_CONNECT_HOST + OP_CONNECT_TOKEN) or OIDC-exchanged short-lived tokens when available.
      - name: Load secrets from 1Password (automation token)
        uses: 1Password/load-secrets-action@v3
        with:
          export-env: |
            DATABASE_URL=op://vault/My App DB/password
            API_KEY=op://vault/My App/API Key/password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      # Alternative (recommended for production): 1Password Connect server.
      # Uncomment when Connect host + token are provisioned.
      # - name: Load secrets from 1Password Connect
      #   uses: 1Password/load-secrets-action@v3
      #   with:
      #     export-env: |
      #       DATABASE_URL=op://vault/My App DB/password
      #       API_KEY=op://vault/My App/API Key/password
      #   env:
      #     OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
      #     OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Show loaded secrets (masked)
        run: |
          echo "DB var (masked): ${DATABASE_URL::8}***"
          echo "API_KEY length: ${#API_KEY}"

      - name: Install dependencies
        run: npm ci

      - name: Run lints and tests
        run: |
          npm run lint --if-present
          npm test --if-present

      - name: Build
        run: npm run build --if-present

      # Optional: manual op CLI install if you need direct CLI commands beyond the Action.
      # - name: Install 1Password CLI (optional)
      #   run: |
      #     sudo apt-get update && sudo apt-get install -y unzip
      #     ARCH=$(uname -m)
      #     case "$ARCH" in
      #       x86_64) ARCH=amd64 ;;
      #       aarch64|arm64) ARCH=arm64 ;;
      #       *) echo "Unsupported arch: $ARCH"; exit 1 ;;
      #     esac
      #     TAG=$(curl -sS https://api.github.com/repos/1Password/op/releases/latest | grep -Po '"tag_name": "\\K.*?(?=")' || true)
      #     [ -z "$TAG" ] && TAG=v2.23.1
      #     VER=${TAG#v}
      #     ZIPURL="https://github.com/1Password/op/releases/download/${TAG}/op_linux_${ARCH}_${VER}.zip"
      #     curl -sSLo /tmp/op.zip "$ZIPURL"
      #     unzip -o /tmp/op.zip -d /tmp/op
      #     sudo install -m 0755 /tmp/op/op /usr/local/bin/op

    # Notes:
    # - Automation token approach is quick & cost-free; rotate token regularly and scope vault access minimally.
    # - Prefer 1Password Connect or OIDC for short-lived tokens when infra allows (better audit & blast radius).
    # - Secrets are masked by the Action; avoid echoing full values in logs.
