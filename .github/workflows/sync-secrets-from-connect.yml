name: Sync secrets from 1Password Connect to GitHub Secrets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours, optional

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (gh, jq)
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update && sudo apt-get install -y gh

      - name: Fetch secrets from Connect and update GitHub repo secrets
        env:
          OP_CONNECT_HOST: "${{ secrets.OP_CONNECT_HOST }}"
          OP_CONNECT_TOKEN: "${{ secrets.op_atlas_it_connect_server_pat }}"
          GH_TOKEN: "${{ secrets.PAT_TOKEN }}"
        run: |
          set -euo pipefail
          if [ -z "${OP_CONNECT_HOST:-}" ] || [ -z "${OP_CONNECT_TOKEN:-}" ]; then
            echo "Missing Connect host or token" >&2
            exit 1
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing GH PAT (PAT_TOKEN) for writing secrets" >&2
            exit 1
          fi

          # Example mapping: specify op:// paths and target GitHub secret names
          # Feel free to adapt this list for your repo
          declare -A MAPPINGS=(
            ["DATABASE_URL"]="op://PP_SHARED_SECRETS/Database/password"
            ["API_KEY"]="op://PP_SHARED_SECRETS/API Key/password"
          )

          gh auth login --with-token <<< "$GH_TOKEN"

          for GHNAME in "${!MAPPINGS[@]}"; do
            OP_PATH=${MAPPINGS[$GHNAME]}
            echo "Fetching $OP_PATH"
            VAL=$(curl -sS -H "Authorization: Bearer $OP_CONNECT_TOKEN" "$OP_CONNECT_HOST/v1/item?path=$OP_PATH" | jq -r '.password // .[]?.fields[]?.value // empty')
            if [ -z "$VAL" ]; then
              echo "Warning: no value returned for $OP_PATH" && continue
            fi
            # Use gh CLI to set the secret (will be encrypted for the repo)
            echo -n "$VAL" | gh secret set "$GHNAME" --body - --repo "$GITHUB_REPOSITORY"
            echo "Updated secret: $GHNAME"
          done

      - name: Completed
        run: echo "Secrets sync completed"
