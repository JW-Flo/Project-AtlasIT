name: Autonomous Agent CI/CD Pipeline

on:
  push:
    branches:
      - sandbox-4o

jobs:
  autonomous-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_MODEL: "gpt-4o"
      GITHUB_REPO: "JW-Flo/Project-Ignite"
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GH_PAT: ${{ secrets.GH_PAT }} # GitHub Personal Access Token  

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP with Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/801724050818/locations/global/workloadIdentityPools/github-pool/providers/github-actions'
          service_account: 'ProjectAdmin@ignite-459301.iam.gserviceaccount.com'

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install openai python-dotenv PyGithub google-cloud-storage google-cloud-firestore google-cloud-bigquery requests

      - name: Run Autonomous Agent Script
        run: |
          python scripts/run_ai_agent.py

      - name: Notify Slack on Completion
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -X POST -H 'Content-type: application/json' --data \
          "{\"text\":\"Autonomous Agent Pipeline completed with status: ${STATUS}\"}" \
          $SLACK_WEBHOOK_URL

      - name: Notify Slack on Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"Autonomous Agent run completed successfully."}' $SLACK_WEBHOOK_URL

      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"Autonomous Agent run failed."}' $SLACK_WEBHOOK_URL
