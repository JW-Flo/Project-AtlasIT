name: Deploy Console to S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - "console-app/**"
      - "packages/shared/**"
  workflow_dispatch:

concurrency:
  group: deploy-console-s3
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    name: Build & Deploy Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: cd packages/shared && pnpm run build

      - name: Build console app (static adapter)
        run: SVELTE_CONFIG=console-app/svelte.config.aws.js pnpm --filter console-app run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Discover S3 bucket and CloudFront distribution from SSM
        run: |
          BUCKET=$(aws ssm get-parameter --name /atlasit/dev/console-bucket --query Parameter.Value --output text)
          DIST_ID=$(aws ssm get-parameter --name /atlasit/dev/cloudfront-distribution-id --query Parameter.Value --output text)
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "DIST_ID=$DIST_ID" >> $GITHUB_ENV

      - name: Sync to S3
        run: aws s3 sync console-app/build/ s3://$BUCKET --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
