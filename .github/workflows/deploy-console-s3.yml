name: Deploy Console to S3 + CloudFront

on:
  # Push trigger removed — deploy-on-merge.yml handles this now.
  # Keep workflow_dispatch for manual targeted deploys.
  workflow_dispatch:

concurrency:
  group: deploy-console-s3
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    name: Build & Deploy Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: cd packages/shared && rm -rf dist tsconfig.tsbuildinfo && npx tsc -p tsconfig.json

      - name: Build SvelteKit (static adapter)
        working-directory: console-app
        run: npx svelte-kit sync && SVELTE_CONFIG=svelte.config.aws.js pnpm run build
        env:
          VITE_API_URL: https://ahjoepuw96.execute-api.us-east-1.amazonaws.com

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          BUCKET=$(aws ssm get-parameter --name "/atlasit/dev/console-bucket" --query "Parameter.Value" --output text 2>/dev/null || echo "atlasit-console-dev-457335975503")
          aws s3 sync console-app/build "s3://$BUCKET" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "service-worker.js"
          # HTML files get short cache
          aws s3 sync console-app/build "s3://$BUCKET" \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "service-worker.js" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws ssm get-parameter --name "/atlasit/dev/cloudfront-distribution-id" --query "Parameter.Value" --output text 2>/dev/null || echo "")
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          else
            echo "::notice::CloudFront distribution ID not found — skipping invalidation"
          fi
