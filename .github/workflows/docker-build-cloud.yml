name: docker-build-cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  buildx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx (cloud)
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "andre1933/op-atlas-it-connect-server"

      - name: Build (no push on PR) or push (main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ vars.DOCKER_USER }}/op-atlas-it-connect-server:latest
          # Cache only on PRs to speed iteration without publishing
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
          provenance: false
          sbom: false

    # Notes:
    # - Requires repository variable DOCKER_USER and secret DOCKER_PAT.
    # - Image name aligned with connect server trial tag.
    # - Disable provenance/SBOM for faster trial builds; enable later for supply-chain visibility.
