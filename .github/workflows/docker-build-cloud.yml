name: docker-build-cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  buildx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Docker credentials
        id: creds
        env:
          DOCKER_USER_FALLBACK: ${{ secrets.OP_ATLAS_IT_CONNECT_SERVER_USER }}
          DOCKER_PAT_FALLBACK: ${{ secrets.OP_ATLAS_IT_CONNECT_SERVER_PAT }}
        run: |
          set -euo pipefail
          echo "Resolving Docker credentials (standard or fallback names)";
          USER_VAL="${DOCKER_USER_FALLBACK:-}";
          PAT_VAL="${DOCKER_PAT_FALLBACK:-}";
          if [ -z "$USER_VAL" ] || [ -z "$PAT_VAL" ]; then
            echo "Docker credentials missing (need DOCKER_USER/DOCKER_PAT or fallback secrets)." >&2
            exit 1
          fi
          echo "user=$USER_VAL" >> $GITHUB_OUTPUT
          echo "pat=$PAT_VAL" >> $GITHUB_OUTPUT
      - name: Log in to Docker Hub (resolved)
        uses: docker/login-action@v3
        with:
          username: ${{ steps.creds.outputs.user }}
          password: ${{ steps.creds.outputs.pat }}

      - name: Set up Docker Buildx (cloud)
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "andre1933/op-atlas-it-connect-server"

      - name: Build (no push on PR) or push (main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.creds.outputs.user }}/op-atlas-it-connect-server:latest
          # Cache only on PRs to speed iteration without publishing
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
          provenance: false
          sbom: false

    # Notes:
  # - Requires either (preferred) DOCKER_USER & DOCKER_PAT or fallback secrets OP_ATLAS_IT_CONNECT_SERVER_USER / OP_ATLAS_IT_CONNECT_SERVER_PAT.
    # - Image name aligned with connect server trial tag.
    # - Disable provenance/SBOM for faster trial builds; enable later for supply-chain visibility.
