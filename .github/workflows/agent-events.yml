name: Agent Events

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Simulate routing
        id: simulate
        run: |
          # Run simulation routing script
          npm run simulate:routing -- \
            --pr-number=${{ github.event.pull_request.number }} \
            --title="${{ github.event.pull_request.title }}" \
            --author="${{ github.event.pull_request.user.login }}" \
            > routing-decision.json
          
          cat routing-decision.json
        continue-on-error: true

      - name: Extract routing decision
        id: decision
        run: |
          if [ -f routing-decision.json ]; then
            severity=$(jq -r '.severity // "low"' routing-decision.json)
            echo "severity=$severity" >> $GITHUB_OUTPUT
            
            decision_json=$(cat routing-decision.json)
            echo "decision<<EOF" >> $GITHUB_OUTPUT
            echo "$decision_json" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "severity=low" >> $GITHUB_OUTPUT
            echo "decision={}" >> $GITHUB_OUTPUT
          fi

      - name: Apply severity label
        if: steps.decision.outputs.severity == 'medium' || steps.decision.outputs.severity == 'high'
        uses: actions/github-script@v7
        with:
          script: |
            const severity = '${{ steps.decision.outputs.severity }}';
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [`severity:${severity}`]
            });

      - name: Post routing comment
        uses: actions/github-script@v7
        with:
          script: |
            const decision = ${{ steps.decision.outputs.decision || '{}' }};
            
            const comment = `## 🤖 Agent Routing Decision
            
            **Severity**: \`${decision.severity || 'low'}\`
            **Decision ID**: \`${decision.decision_id || 'N/A'}\`
            
            ### Assigned Agents
            - **Primary**: ${decision.agents?.primary || 'none'}
            ${decision.agents?.secondary ? `- **Secondary**: ${decision.agents.secondary}` : ''}
            
            ### Evidence Required
            ${decision.evidence_required?.length > 0 ? decision.evidence_required.map(e => `- \`${e}\``).join('\n') : 'None'}
            
            ### Prohibited Patterns
            ${decision.prohibited_hits?.length > 0 ? '⚠️ **Warning**: Prohibited patterns detected:\n' + decision.prohibited_hits.map(p => `- \`${p}\``).join('\n') : '✅ No prohibited patterns detected'}
            
            ---
            *Timestamp*: ${decision.timestamp || new Date().toISOString()}
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
