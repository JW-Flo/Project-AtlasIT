name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test-sbom:
    runs-on: ubuntu-latest
    env:
      ONBOARDING_API_KEY: dummy-onboarding-ci
      ORCHESTRATOR_API_KEY: dummy-orchestrator-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Validate environment
        run: npm run validate:env
      - name: Build, test, sbom
        run: npm run ci:run
      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: artifacts/ci
      
      - name: CodeQL Analysis (placeholder)
        run: |
          echo "CodeQL analysis would run here (deferred to PR3)"
          echo "See: https://github.com/github/codeql-action"
          echo "STATUS: PLACEHOLDER - Security scanning to be enabled in future PR"
      
      - name: Trivy Security Scan (placeholder)
        run: |
