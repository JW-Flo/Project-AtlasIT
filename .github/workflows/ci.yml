name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test-sbom:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    env:
      ONBOARDING_API_KEY: dummy-onboarding-ci
      ORCHESTRATOR_API_KEY: dummy-orchestrator-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm install --no-fund --no-audit
      - name: Validate environment
        run: npm run validate:env
      - name: Build, test, sbom
        run: npm run ci:run
      - name: Drift scan
        run: npm run drift:scan
      - name: OPA policy tests
        run: |
          if [ -d "policies" ]; then
            npm run opa:test || echo "OPA tests skipped (no valid policies)"
          else
            echo "No policies directory, skipping OPA tests"
          fi
      - name: Aggregate evidence
        run: npm run evidence:aggregate
      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-node-${{ matrix.node-version }}
          path: artifacts/
