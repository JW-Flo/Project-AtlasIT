name: Merge Orchestrator

on:
  pull_request:
    types: [labeled, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Check drift PRs
        id: drift_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if any open drift PRs exist with high severity
          # Block merge if high-severity drift PRs are open
          echo "Checking for open drift PRs..."
          # TODO: Implement GitHub CLI call to check for open drift/* PRs with severity:high label
          echo "drift_blocking=false" >> $GITHUB_OUTPUT

      - name: Validate evidence integrity
        id: evidence_validation
        run: |
          # Validate evidence hashes and completeness
          echo "Validating evidence artifacts..."
          if [ -d ".evidence" ]; then
            evidence_count=$(find .evidence -name "*.json" | wc -l)
            echo "Found $evidence_count evidence artifacts"
            echo "evidence_valid=true" >> $GITHUB_OUTPUT
          else
            echo "evidence_valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Check schema file changes
        id: schema_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if EVIDENCE_SCHEMA.json or DRIFT_DETECTION_SPEC.md changed
          echo "Checking for schema file changes..."
          # Use GitHub CLI to get changed files from PR
          changed_files=$(gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path')

          if echo "$changed_files" | grep -qE "(EVIDENCE_SCHEMA\.json|DRIFT_DETECTION_SPEC\.md)"; then
            echo "schema_changed=true" >> $GITHUB_OUTPUT
            echo "Schema files changed - requires Codex approval"
          else
            echo "schema_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Enforce approval requirements
        id: approval_check
        run: |
          # Check if PR has required approvals based on severity
          pr_labels="${{ join(github.event.pull_request.labels.*.name, ',') }}"

          if echo "$pr_labels" | grep -q "severity:medium"; then
            echo "requires_approval=true" >> $GITHUB_OUTPUT
            echo "Medium severity PR requires approval"
          elif echo "$pr_labels" | grep -q "severity:high"; then
            echo "requires_approval=true" >> $GITHUB_OUTPUT
            echo "High severity PR requires multiple approvals"
          else
            echo "requires_approval=false" >> $GITHUB_OUTPUT
          fi

      - name: Block merge if drift PRs open
        if: steps.drift_check.outputs.drift_blocking == 'true'
        run: |
          echo "::error::Merge blocked: High-severity drift PRs must be resolved first"
          exit 1

      - name: Block merge if evidence invalid
        if: steps.evidence_validation.outputs.evidence_valid == 'false'
        run: |
          echo "::error::Merge blocked: Evidence validation failed"
          exit 1

      - name: Set merge status
        run: |
          echo "✅ Merge orchestrator validations passed"
          echo "Drift PRs: ${{ steps.drift_check.outputs.drift_blocking }}"
          echo "Evidence valid: ${{ steps.evidence_validation.outputs.evidence_valid }}"
          echo "Schema changed: ${{ steps.schema_check.outputs.schema_changed }}"
          echo "Requires approval: ${{ steps.approval_check.outputs.requires_approval }}"
