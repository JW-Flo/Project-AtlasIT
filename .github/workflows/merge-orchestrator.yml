name: Merge Orchestrator

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  route-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Extract PR metadata
        id: pr-metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          TITLE="${{ github.event.pull_request.title }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          
          # Fetch changed files using GitHub CLI
          FILES=$(gh pr view "$PR_NUMBER" --json files -q '.files[].path' || echo "")
          
          # Convert newline-separated list to JSON array, handling empty case
          if [ -z "$FILES" ]; then
            FILES_JSON="[]"
          else
            FILES_JSON=$(echo "$FILES" | jq -R -s 'split("\n") | map(select(length > 0))')
          fi
          
          # Fetch labels
          LABELS=$(jq -r '[.pull_request.labels[].name]' "$GITHUB_EVENT_PATH" || echo "[]")
          
          # Write metadata JSON using jq for proper escaping
          jq -n \
            --arg pr_number "$PR_NUMBER" \
            --arg title "$TITLE" \
            --argjson files_changed "$FILES_JSON" \
            --argjson labels "$LABELS" \
            --arg author "$AUTHOR" \
            '{pr_number: ($pr_number|tonumber), title: $title, files_changed: $files_changed, labels: $labels, author: $author}' \
            > /tmp/pr-metadata.json
          
          echo "metadata_path=/tmp/pr-metadata.json" >> $GITHUB_OUTPUT

      - name: Simulate routing decision
        id: routing
        run: |
          npm run simulate:routing -- /tmp/pr-metadata.json "pr-${{ github.event.pull_request.number }}" 2> /tmp/decision.log | tail -1 > /tmp/decision.json
          cat /tmp/decision.json
          echo "decision_path=/tmp/decision.json" >> $GITHUB_OUTPUT

      - name: Apply labels based on routing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Validate JSON before parsing
          if ! jq empty /tmp/decision.json 2>/dev/null; then
            echo "Error: Invalid JSON in decision output"
            cat /tmp/decision.log
            exit 1
          fi
          
          SEVERITY=$(jq -r '.severity' /tmp/decision.json)
          ASSIGNEE=$(jq -r '.assignee' /tmp/decision.json)
          
          gh pr edit ${{ github.event.pull_request.number }} --add-label "severity:${SEVERITY}"
          
          if [ "$ASSIGNEE" = "codex" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "agent:codex-approved"
          elif [ "$ASSIGNEE" = "copilot" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "agent:copilot-approved"
          fi

      - name: Comment routing decision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DECISION=$(cat /tmp/decision.json)
          gh pr comment ${{ github.event.pull_request.number }} --body "## Routing Decision

          \`\`\`json
          ${DECISION}
          \`\`\`
          "
