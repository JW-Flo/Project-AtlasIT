name: OpenAPI Contract Gate

on:
    pull_request:
        paths:
            - "docs/api/openapi.yaml"
            - ".github/workflows/openapi-contract-gate.yml"
            - "docs/api/CHANGELOG.md"

jobs:
    contract-drift:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Detect openapi spec change
              id: diff
              run: |
                  if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q 'docs/api/openapi.yaml'; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                  fi

            - name: Fail if spec changed without changelog update
              if: steps.diff.outputs.changed == 'true'
              run: |
                  if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q 'docs/api/CHANGELOG.md'; then
                    echo "Changelog updated.";
                  else
                    echo "ERROR: docs/api/openapi.yaml modified without docs/api/CHANGELOG.md update.";
                    exit 1;
                  fi

            - name: (Optional) Run openapi verify
              if: steps.diff.outputs.changed == 'true'
              run: |
                  if [ -f scripts/openapi-verify.mjs ]; then
                    node scripts/openapi-verify.mjs || exit 1
                  else
                    echo "No verification script present"
                  fi
