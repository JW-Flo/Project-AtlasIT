name: Deploy Console Worker

on:
    push:
        branches: [main]
        paths:
            - "console-app/**"
            - "packages/shared/**"
            - ".github/workflows/deploy-console.yml"
            - "DEPLOY_ENV.md"
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: pnpm

            - name: Install deps
              run: pnpm install --frozen-lockfile

            - name: Build console
              run: pnpm run build && touch .svelte-kit/cloudflare/.assetsignore
              working-directory: console-app

            - name: Lint console (best effort)
              run: |
                  pnpm exec eslint console-app || \
                    echo 'Lint warnings ignored for deploy'

            - name: Deploy console worker
              run: pnpm exec wrangler deploy --config console-app/wrangler.toml

            - name: Post-deploy smoke
              run: |
                  set -e
                  DEFAULT_URL="https://atlasit-console.${CLOUDFLARE_ACCOUNT_ID}.workers.dev"
                  FALLBACK_URL=${CONSOLE_WORKERS_DEV:-"$DEFAULT_URL"}
                  echo "Probing config endpoint: $FALLBACK_URL/api/config"
                  curl -sS "$FALLBACK_URL/api/config" || \
                    echo 'Config probe failed (may require custom domain propagation).'
                  echo "Probing mock compliance snapshot:"
                  echo "$FALLBACK_URL/api/mock/compliance/snapshot"
                  curl -sS "$FALLBACK_URL/api/mock/compliance/snapshot" | \
                    head -c 300 || echo 'Snapshot probe failed.'
              if: always()

            - name: Guidance
              run: |
                  echo 'Deployed atlasit-console worker.'
                  echo 'If custom domain routes (www.atlasit.pro/console*)'
                  echo 'still 404, verify DNS, route propagation, and that'
                  echo 'no overlapping Pages project is intercepting base path.'
                  echo 'workers.dev fallback usable immediately.'
