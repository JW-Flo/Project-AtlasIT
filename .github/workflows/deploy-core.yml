name: Deploy Core Worker

on:
    push:
        branches: [main]
        paths:
            - "index.js"
            - "wrangler.toml"
            - "packages/shared/**"
            - ".github/workflows/deploy-core.yml"
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm

            - name: Install deps
              run: npm ci

            - name: Deploy core worker
              run: npx wrangler deploy

            - name: Post-deploy smoke test
              run: |
                  echo "Probing api.atlasit.pro/health..."
                  curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
                    "https://api.atlasit.pro/health" || echo "unreachable"
              if: always()
