name: Deploy Compliance Worker

on:
  push:
    branches: [main]
    paths:
      - "compliance-worker/**"
      - "src/lib/**"
      - "fixtures/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-compliance-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install compliance worker deps
        run: npm ci --no-fund --no-audit
        working-directory: compliance-worker

      - name: Deploy compliance worker
        run: npx wrangler deploy
        working-directory: compliance-worker

      - name: Post-deploy smoke test
        run: |
          WORKER_URL="https://atlasit-compliance-worker.kd8jc7v8cd.workers.dev"
          MAX_RETRIES=4
          SLEEP_SECS=10

          # Health check with retry/backoff — fail the job if never 200
          echo "Probing health endpoint (up to $MAX_RETRIES attempts)..."
          HEALTH_OK=false
          for i in $(seq 1 $MAX_RETRIES); do
            HEALTH_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "$WORKER_URL/api/compliance/health" || echo "000")
            echo "  Attempt $i: $HEALTH_CODE"
            if [ "$HEALTH_CODE" = "200" ]; then
              HEALTH_OK=true
              echo "Health endpoint healthy."
              break
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "  Waiting ${SLEEP_SECS}s before retry..."
              sleep $SLEEP_SECS
            fi
          done
          if [ "$HEALTH_OK" = "false" ]; then
            echo "ERROR: Health endpoint did not return 200 after $MAX_RETRIES attempts. Deploy may be broken."
            exit 1
          fi

          # Snapshot probe — informational only (may need D1 migration or secrets)
          echo ""
          echo "Probing snapshot endpoint (informational)..."
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$WORKER_URL/api/compliance/snapshot" || echo "000")
          echo "Snapshot response: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "WARNING: Snapshot probe failed (transient or propagation delay)."
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "Snapshot endpoint healthy."
          else
            echo "WARNING: Snapshot returned $HTTP_CODE — may need D1 migration or secret setup."
          fi
        if: always()

      - name: Guidance
        run: |
          echo 'Deployed atlasit-compliance-worker.'
          echo 'Ensure D1 migrations are applied: npm run migrate:compliance'
          echo 'Ensure API_TOKENS KV namespace has valid tokens for auth.'
          echo 'workers.dev URL: https://atlasit-compliance-worker.kd8jc7v8cd.workers.dev'
