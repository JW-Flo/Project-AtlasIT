name: 1Password Secrets

on:
  workflow_call:
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
    inputs:
      environment:
        description: "Optional GitHub environment for downstream jobs (for context only)"
        required: false
        type: string
      run_live_check:
        description: "Install 1Password CLI and perform a live vault fetch/validation"
        required: false
        type: boolean
  workflow_dispatch:
    inputs:
      environment:
        description: "Optional GitHub environment for downstream jobs (for context only)"
        required: false
        type: choice
        options:
          - ''
          - development
          - staging
          - production
      run_live_check:
        description: "Install 1Password CLI and perform a live vault fetch/validation"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  load-secrets:
    name: Load 1Password secrets
    runs-on: ubuntu-latest
    env:
      # Service account token is injected from the caller (stored as a GitHub secret).
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    outputs:
      CF_ACCOUNT_ID: ${{ steps.export.outputs.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ steps.export.outputs.CF_API_TOKEN }}
      CF_API_EMAIL: ${{ steps.export.outputs.CF_API_EMAIL }}
      OKTA_DOMAIN: ${{ steps.export.outputs.OKTA_DOMAIN }}
      OKTA_API_TOKEN: ${{ steps.export.outputs.OKTA_API_TOKEN }}
      OKTA_CLIENT_ID: ${{ steps.export.outputs.OKTA_CLIENT_ID }}
      OKTA_CLIENT_SECRET: ${{ steps.export.outputs.OKTA_CLIENT_SECRET }}
      OPENAI_API_KEY: ${{ steps.export.outputs.OPENAI_API_KEY }}
      TOGETHER_API_KEY: ${{ steps.export.outputs.TOGETHER_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ steps.export.outputs.SLACK_WEBHOOK_URL }}
      RAMP_API_KEY: ${{ steps.export.outputs.RAMP_API_KEY }}
      RAMP_CLIENT_ID: ${{ steps.export.outputs.RAMP_CLIENT_ID }}
      RAMP_CLIENT_SECRET: ${{ steps.export.outputs.RAMP_CLIENT_SECRET }}
      GITHUB_TOKEN: ${{ steps.export.outputs.GITHUB_TOKEN }}
      GH_PAT: ${{ steps.export.outputs.GH_PAT }}
      DATABASE_URL: ${{ steps.export.outputs.DATABASE_URL }}
      S3_BUCKET: ${{ steps.export.outputs.S3_BUCKET }}
      AWS_ACCESS_KEY_ID_SANDBOX: ${{ steps.export.outputs.AWS_ACCESS_KEY_ID_SANDBOX }}
      AWS_SECRET_ACCESS_KEY_SANDBOX: ${{ steps.export.outputs.AWS_SECRET_ACCESS_KEY_SANDBOX }}
    steps:
      - name: Checkout (metadata only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture existing environment values (fallbacks)
        id: existing
        run: |
          names=(CF_ACCOUNT_ID CF_API_TOKEN CF_API_EMAIL OKTA_DOMAIN OKTA_API_TOKEN OKTA_CLIENT_ID OKTA_CLIENT_SECRET \
                 OPENAI_API_KEY TOGETHER_API_KEY SLACK_WEBHOOK_URL RAMP_API_KEY RAMP_CLIENT_ID RAMP_CLIENT_SECRET \
                 GITHUB_TOKEN GH_PAT DATABASE_URL S3_BUCKET AWS_ACCESS_KEY_ID_SANDBOX AWS_SECRET_ACCESS_KEY_SANDBOX)
          for name in "${names[@]}"; do
            value="${!name:-}"
            if [[ -n "$value" ]]; then
              echo "Preserving pre-existing $name for comparison" >> "$GITHUB_STEP_SUMMARY"
              echo "$name=$value" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Load secrets from 1Password
        id: load
        uses: 1password/load-secrets-action@v1
        with:
          export-env: true
          # Secrets are mapped 1:1 with ops/secrets/op-map.json for clarity.
          secrets: |
            CF_ACCOUNT_ID=op://AtlasIT Cloudflare/Cloudflare Account/Account ID
            CF_API_TOKEN=op://AtlasIT Cloudflare/Cloudflare API Token/credential
            CF_API_EMAIL=op://AtlasIT Cloudflare/Cloudflare Account/Email
            OKTA_DOMAIN=op://AtlasIT Okta/Okta Domain/domain
            OKTA_API_TOKEN=op://AtlasIT Okta/Okta API Token/credential
            OKTA_CLIENT_ID=op://AtlasIT Okta/Okta OIDC App/client_id
            OKTA_CLIENT_SECRET=op://AtlasIT Okta/Okta OIDC App/client_secret
            OPENAI_API_KEY=op://AI Providers/OpenAI/key
            TOGETHER_API_KEY=op://AI Providers/Together/key
            SLACK_WEBHOOK_URL=op://Integrations/Slack Webhook/url
            RAMP_API_KEY=op://Finance/Ramp/API Key
            RAMP_CLIENT_ID=op://Finance/Ramp/Client ID
            RAMP_CLIENT_SECRET=op://Finance/Ramp/Client Secret
            GITHUB_TOKEN=op://Automation/GitHub PAT/token
            GH_PAT=op://Automation/GitHub PAT/token
            DATABASE_URL=op://Databases/Primary Postgres/URL
            S3_BUCKET=op://AWS/S3 Evidence Bucket/name
            AWS_ACCESS_KEY_ID_SANDBOX=op://AWS/Sandbox User/access_key_id
            AWS_SECRET_ACCESS_KEY_SANDBOX=op://AWS/Sandbox User/secret_access_key
          mask-outputs: true

      - name: Validate and consolidate credentials
        id: export
        env:
          EXISTING_CF_ACCOUNT_ID: ${{ steps.existing.outputs.CF_ACCOUNT_ID }}
          EXISTING_CF_API_TOKEN: ${{ steps.existing.outputs.CF_API_TOKEN }}
          EXISTING_CF_API_EMAIL: ${{ steps.existing.outputs.CF_API_EMAIL }}
          EXISTING_OKTA_DOMAIN: ${{ steps.existing.outputs.OKTA_DOMAIN }}
          EXISTING_OKTA_API_TOKEN: ${{ steps.existing.outputs.OKTA_API_TOKEN }}
          EXISTING_OKTA_CLIENT_ID: ${{ steps.existing.outputs.OKTA_CLIENT_ID }}
          EXISTING_OKTA_CLIENT_SECRET: ${{ steps.existing.outputs.OKTA_CLIENT_SECRET }}
          EXISTING_OPENAI_API_KEY: ${{ steps.existing.outputs.OPENAI_API_KEY }}
          EXISTING_TOGETHER_API_KEY: ${{ steps.existing.outputs.TOGETHER_API_KEY }}
          EXISTING_SLACK_WEBHOOK_URL: ${{ steps.existing.outputs.SLACK_WEBHOOK_URL }}
          EXISTING_RAMP_API_KEY: ${{ steps.existing.outputs.RAMP_API_KEY }}
          EXISTING_RAMP_CLIENT_ID: ${{ steps.existing.outputs.RAMP_CLIENT_ID }}
          EXISTING_RAMP_CLIENT_SECRET: ${{ steps.existing.outputs.RAMP_CLIENT_SECRET }}
          EXISTING_GITHUB_TOKEN: ${{ steps.existing.outputs.GITHUB_TOKEN }}
          EXISTING_GH_PAT: ${{ steps.existing.outputs.GH_PAT }}
          EXISTING_DATABASE_URL: ${{ steps.existing.outputs.DATABASE_URL }}
          EXISTING_S3_BUCKET: ${{ steps.existing.outputs.S3_BUCKET }}
          EXISTING_AWS_ACCESS_KEY_ID_SANDBOX: ${{ steps.existing.outputs.AWS_ACCESS_KEY_ID_SANDBOX }}
          EXISTING_AWS_SECRET_ACCESS_KEY_SANDBOX: ${{ steps.existing.outputs.AWS_SECRET_ACCESS_KEY_SANDBOX }}
        run: |
          # These outputs mirror the mappings above for jobs that declare `needs: load-secrets`.
          names=(CF_ACCOUNT_ID CF_API_TOKEN CF_API_EMAIL OKTA_DOMAIN OKTA_API_TOKEN OKTA_CLIENT_ID OKTA_CLIENT_SECRET \
                 OPENAI_API_KEY TOGETHER_API_KEY SLACK_WEBHOOK_URL RAMP_API_KEY RAMP_CLIENT_ID RAMP_CLIENT_SECRET \
                 GITHUB_TOKEN GH_PAT DATABASE_URL S3_BUCKET AWS_ACCESS_KEY_ID_SANDBOX AWS_SECRET_ACCESS_KEY_SANDBOX)

          is_placeholder() {
            shopt -s nocasematch
            local value="$1"
            [[ "$value" =~ ^(changeme|change_me|placeholder|dummy|sample|example|todo)$ ]] || [[ "$value" =~ <.*> ]]
            local result=$?
            shopt -u nocasematch
            return $result
          }

          validate_value() {
            local label="$1"; local value="$2"; local source="$3"
            if [[ -z "$value" ]]; then
              echo "$label: $source value is empty" >> "$GITHUB_STEP_SUMMARY"
              return 1
            fi
            if is_placeholder "$value"; then
              echo "$label: $source value rejected as placeholder" >> "$GITHUB_STEP_SUMMARY"
              return 1
            fi

            case "$label" in
              OPENAI_API_KEY)
                [[ "$value" =~ ^sk-[A-Za-z0-9]{20,}$ ]] || { echo "$label: $source value failed prefix check (sk-)" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              TOGETHER_API_KEY)
                [[ "$value" =~ ^(tg|sk)-[A-Za-z0-9]{20,}$ ]] || { echo "$label: $source value failed expected prefix check (tg-/sk-)" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              GITHUB_TOKEN|GH_PAT)
                [[ "$value" =~ ^(ghp_|github_pat_)[A-Za-z0-9_]{20,}$ ]] || { echo "$label: $source value must start with ghp_ or github_pat_" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              CF_ACCOUNT_ID)
                [[ "$value" =~ ^[A-Fa-f0-9]{32}$ ]] || { echo "$label: $source value should be a 32-character hex string" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              CF_API_EMAIL)
                [[ "$value" == *"@"* && "$value" == *.* ]] || { echo "$label: $source value does not look like an email" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              CF_API_TOKEN)
                [[ "$value" =~ ^[A-Za-z0-9_-]{37,}$ ]] || { echo "$label: $source value is not the expected token shape" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              OKTA_DOMAIN)
                [[ "$value" =~ \.okta\.com$ ]] || { echo "$label: $source value must end with .okta.com" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              OKTA_API_TOKEN)
                [[ "$value" =~ ^00[A-Za-z0-9_-]{40,}$ ]] || { echo "$label: $source token does not follow Okta token shape" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              OKTA_CLIENT_ID)
                [[ "$value" =~ ^[A-Za-z0-9]{20,}$ ]] || { echo "$label: $source client_id not expected shape" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              OKTA_CLIENT_SECRET)
                [[ ${#value} -ge 20 ]] || { echo "$label: $source client_secret too short" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              SLACK_WEBHOOK_URL)
                [[ "$value" =~ ^https://hooks.slack.com/ ]] || { echo "$label: $source value must be a Slack webhook URL" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              DATABASE_URL)
                [[ "$value" == *"://"* ]] || { echo "$label: $source value must be a connection URL" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              S3_BUCKET)
                [[ "$value" =~ ^[a-z0-9.-]+$ ]] || { echo "$label: $source value must be a valid bucket name" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              AWS_ACCESS_KEY_ID_SANDBOX)
                [[ "$value" =~ ^(AKIA|ASIA)[A-Z0-9]{16}$ ]] || { echo "$label: $source value must look like an AWS access key" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              AWS_SECRET_ACCESS_KEY_SANDBOX)
                [[ "$value" =~ ^[A-Za-z0-9/+=]{40}$ ]] || { echo "$label: $source value must look like an AWS secret key" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              RAMP_API_KEY|RAMP_CLIENT_SECRET)
                [[ ${#value} -ge 24 ]] || { echo "$label: $source value unexpectedly short" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              RAMP_CLIENT_ID)
                [[ ${#value} -ge 12 ]] || { echo "$label: $source value unexpectedly short" >> "$GITHUB_STEP_SUMMARY"; return 1; }
                ;;
              *)
                if [[ ${#value} -lt 8 ]]; then
                  echo "$label: $source value too short to be a functional credential" >> "$GITHUB_STEP_SUMMARY"
                  return 1
                fi
                ;;
            esac
            return 0
          }

          for name in "${names[@]}"; do
            op_value="${!name:-}"
            existing_var="EXISTING_${name}"
            fallback_value="${!existing_var:-}"

            valid_op=0; valid_existing=0
            validate_value "$name" "$op_value" "1Password" || valid_op=$?
            validate_value "$name" "$fallback_value" "pre-existing env" || valid_existing=$?

            if [[ $valid_op -eq 0 ]]; then
              value="$op_value"
              source="1Password"
            elif [[ $valid_existing -eq 0 ]]; then
              value="$fallback_value"
              source="pre-existing env"
            else
              echo "Refusing to export $name because no functional credential is available." >&2
              exit 1
            fi

            echo "::add-mask::$value"
            echo "$name=$value" >> "$GITHUB_OUTPUT"
            echo "$name exported from $source after validation" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Emit environment summary
        run: |
          echo "Secrets loaded for use by downstream jobs." >> "$GITHUB_STEP_SUMMARY"
          echo "Environment input: ${{ inputs.environment || 'not provided' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Variables available via needs.load-secrets.outputs.*" >> "$GITHUB_STEP_SUMMARY"

      - name: Install 1Password CLI (for live validation)
        if: inputs.run_live_check == true
        uses: 1password/install-cli-action@v1

      - name: Live 1Password fetch and validation (redacted)
        if: inputs.run_live_check == true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          ./ci/live-1password-fetch.sh >> "$GITHUB_STEP_SUMMARY"
