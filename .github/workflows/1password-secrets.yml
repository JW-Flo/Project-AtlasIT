name: Reusable 1Password helper

on:
  workflow_call:
    inputs:
      mode:
        description: 'Mode to operate in: connect or oidc'
        required: false
        default: 'connect'
        type: string
      mapping-file:
        description: 'Path to a local mapping / manifest used by validation (optional)'
        required: false
        default: 'ops/secrets/op-map.json'
        type: string
      live-fetch:
        description: 'If true, perform a non-destructive live verification (opt-in). Defaults to false.'
        required: false
        default: 'false'
        type: boolean
    outputs:
      validated:
        description: 'Mapping validated (non-live checks)'
      connect_verified:
        description: 'Connect host was reachable and returned vaults (only if live-fetch)'
      oidc_verified:
        description: 'OIDC exchange endpoint returned a token (only if live-fetch and mode=oidc)'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      validated: ${{ steps.validate.outputs.validated }}
      connect_verified: ${{ steps.connect-check.outputs.connect_verified || 'false' }}
      oidc_verified: ${{ steps.oidc-check.outputs.oidc_verified || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Non-live mapping validation
        id: validate
        run: |
          set -euo pipefail
          MAPPING=${{ inputs.mapping-file }}
          # If the validator script exists, run it; otherwise do a basic sanity check
          if [ -x ./ci/validate-1password-mappings.sh ]; then
            bash ./ci/validate-1password-mappings.sh "$MAPPING"
          else
            echo "No validator found at ./ci/validate-1password-mappings.sh; performing basic checks"
            if [ ! -f "$MAPPING" ]; then
              echo "Warning: mapping file '$MAPPING' not found" >&2
            else
              echo "Mapping file '$MAPPING' exists"
            fi
          fi
          echo "validated=true" >> "$GITHUB_OUTPUT"

      - name: Optional: Connect host verification (live, non-destructive)
        id: connect-check
        if: ${{ inputs.mode == 'connect' && inputs.live-fetch == 'true' }}
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.op_atlas_it_connect_server_pat }}
        run: |
          set -euo pipefail
          if [ -z "${OP_CONNECT_HOST:-}" ] || [ -z "${OP_CONNECT_TOKEN:-}" ]; then
            echo "connect_verified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Safe, non-destructive GET to list vaults
          VAULTS=$(curl -sS -H "Authorization: Bearer $OP_CONNECT_TOKEN" "$OP_CONNECT_HOST/v1/vaults" || true)
          if [ -z "$VAULTS" ]; then
            echo "connect_verified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$VAULTS" | jq -r '.[]?.name' | sed -n '1,5p' || true
          echo "connect_verified=true" >> "$GITHUB_OUTPUT"

      - name: Optional: OIDC exchange verification (live, opt-in)
        id: oidc-check
        if: ${{ inputs.mode == 'oidc' && inputs.live-fetch == 'true' }}
        env:
          OIDC_EXCHANGE_URL: ${{ secrets.OP_CONNECT_OIDC_EXCHANGE_URL }}
          # Consumer workflow may provide a test ID_TOKEN via environment for verification.
        run: |
          set -euo pipefail
          if [ -z "${OIDC_EXCHANGE_URL:-}" ]; then
            echo "oidc_verified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${ID_TOKEN:-}" ]; then
            echo "No ID_TOKEN provided for verification test; skipping" >&2
            echo "oidc_verified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESP=$(curl -sS -X POST "$OIDC_EXCHANGE_URL" -H 'Content-Type: application/json' -d '{"id_token":"'"${ID_TOKEN}"'"}') || true
          # Expect JSON with an access_token or token field from the exchange
          TOKEN=$(echo "$RESP" | jq -r '.access_token // .token // empty' 2>/dev/null || true)
          if [ -z "$TOKEN" ]; then
            echo "oidc_verified=false" >> "$GITHUB_OUTPUT"
            echo "Exchange response did not return an access token" >&2
            exit 0
          fi
          echo "oidc_verified=true" >> "$GITHUB_OUTPUT"
