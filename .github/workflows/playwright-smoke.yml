name: playwright-smoke

on:
    workflow_dispatch:
    deployment_status:

jobs:
    smoke:
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
            - name: Install deps
              run: npm ci --ignore-scripts
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps chromium
            - name: Determine base URL
              id: base
              run: |
                  if [ -n "${{ github.event.deployment_status.environment_url }}" ]; then
                    echo "PLAYWRIGHT_BASE_URL=${{ github.event.deployment_status.environment_url }}" >> $GITHUB_ENV
                  else
                    echo "PLAYWRIGHT_BASE_URL=${BASE_URL:-http://localhost:8787}" >> $GITHUB_ENV
                  fi
            - name: Run smoke tests
              run: npm run test:pw
            - name: Upload HTML report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report
