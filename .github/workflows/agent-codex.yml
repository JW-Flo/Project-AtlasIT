name: Agent Codex Runner

on:
  push:
    paths:
      - "ops/hand-off.md"
    branches:
      - "**"

jobs:
  codex-execute:
    # Only run if commit message contains "READY"
    if: contains(github.event.head_commit.message, 'READY')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for committing .codex.done

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Execute Codex Runner
        id: codex-run
        run: |
          node scripts/run-codex.mjs
        continue-on-error: true

      - name: Verify Evidence Artifacts Exist
        run: |
          if ! ls .codex.done 1> /dev/null 2>&1; then
            echo "❌ .codex.done file not found. Workflow execution may have failed."
            exit 1
          fi
          if ! ls artifacts/EV-codex-*.json 1> /dev/null 2>&1; then
            echo "❌ No evidence artifacts found matching artifacts/EV-codex-*.json."
            exit 1
          fi
          echo "✅ Evidence artifacts verified."

      - name: Commit .codex.done
        if: ${{ steps.codex-run.outcome == 'success' || steps.codex-run.outcome == 'failure' }}
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "[AUTO] CodeGen execution completed"
          file_pattern: ".codex.done artifacts/EV-codex-*.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Upload Evidence Artifacts
        if: ${{ steps.codex-run.outcome == 'success' || steps.codex-run.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-evidence-${{ github.run_id }}
          path: |
            .codex.done
            artifacts/EV-codex-*.json
          retention-days: 90
