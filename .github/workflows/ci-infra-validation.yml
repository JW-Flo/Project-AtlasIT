name: Infra Validation CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
            - name: Install deps
              run: |
                  if [ -f package.json ]; then npm install --no-audit --no-fund; fi
            - name: Run vitest (bindings + infra tests)
              run: npx vitest run --reporter default --coverage=false
