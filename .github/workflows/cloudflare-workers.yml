name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || true

      - name: Install Wrangler
        run: npm install -g @cloudflare/wrangler

      - name: Lint index.js
        run: |
          npx eslint index.js || echo '⚠️  Lint warnings (not fatal)'

      - name: Validate wrangler.toml and dispatcher binding
        run: |
          grep '[[dispatch_namespaces]]' wrangler.toml || (echo '❌ dispatcher binding missing in wrangler.toml' && exit 1)
          grep 'binding.*dispatcher' wrangler.toml || (echo '❌ dispatcher binding missing in wrangler.toml' && exit 1)

      - name: Authenticate Wrangler
        run: npx wrangler login --api-token "$WRANGLER_API_TOKEN"
        env:
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}

      - name: Publish Worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
        run: npx wrangler publish

      - name: Post-deploy smoke test
        run: |
          sleep 10
          ./scripts/smoke-test-worker.sh "https://project-ignite.example.com/health"

      - name: Success message
        if: success()
        run: echo '✅ Workers deployed and healthy'
