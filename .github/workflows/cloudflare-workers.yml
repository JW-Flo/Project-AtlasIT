name: Cloudflare Workers CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Add GitHub Actions workflow for Cloudflare Workers"
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ONBOARDING_API_KEY: dummy-onboarding-ci
      ORCHESTRATOR_API_KEY: dummy-orchestrator-ci

    steps:
      - id: cache-node
        name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - id: cache-terraform
        name: Cache Terraform binary
        uses: actions/cache@v3
        with:
          path: /usr/local/bin/terraform
          key: ${{ runner.os }}-terraform-1.5.0

      - name: Install Terraform (if not cached)
        if: steps.cache-terraform.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y gnupg software-properties-common curl unzip
          curl -fsSL https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          sudo mv terraform /usr/local/bin/

      - name: Verify Terraform Installation
        run: terraform --version

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate environment
        run: npm run validate:env

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Set up environment variables
        run: |
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> $GITHUB_ENV
          echo "GH_PAT=${{ secrets.GH_PAT }}" >> $GITHUB_ENV

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy

      - name: Log success
        if: success()
        run: echo "✅ Cloudflare Workers deployed successfully."

      - name: Log failure
        if: failure()
        run: echo "❌ Failed to deploy Cloudflare Workers. Check logs for details."

      - name: Run smoke test (end-to-end proof)
        run: |
          export MCP_URL="https://your-mcp.workers.dev"
          export SLACK_WEBHOOK_URL="https://hooks.slack.com/services/your-webhook-url"
          bash ./scripts/smoke-test-worker.sh

      - name: Deploy AI Worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
        run: npx wrangler publish --env ai

      - name: Smoke test AI Worker
        env:
          AI_WORKER_URL: "https://atlasit-ai.kd8jc7v8cd.workers.dev"
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
        run: ./scripts/smoke-test-ai-worker.sh

      - name: Test MCP dispatch to all AI providers
        run: |
          curl -X POST https://atlasit-core.kd8jc7v8cd.workers.dev/task -H 'Content-Type: application/json' -d '{"content":"Test Together","provider":"together"}'
          curl -X POST https://atlasit-core.kd8jc7v8cd.workers.dev/task -H 'Content-Type: application/json' -d '{"content":"Test Gemini","provider":"gemini"}'
          curl -X POST https://atlasit-core.kd8jc7v8cd.workers.dev/task -H 'Content-Type: application/json' -d '{"content":"Test Cloudflare AI","provider":"cloudflare-ai"}'
          curl https://atlasit-core.kd8jc7v8cd.workers.dev/tasks

      - name: Revert repository to desired state
        run: |
          git log -1 --before="2023-04-01 13:15:00" --format="%H" > commit_hash.txt
          git revert $(cat commit_hash.txt)
          git checkout $(cat commit_hash.txt)
          git push origin main
