name: Auto-Commit After Deployment

on:
  workflow_run:
    workflows: ["Deploy Documentation Agent", "Deploy Confluence Agent"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  workflow_dispatch:  # Allow manual triggers

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check for Active Deployment
        run: |
          if [[ -f .deploying ]]; then
            echo "Deployment in progress. Skipping commit."
            exit 0
          fi

      - name: Check for Critical Endpoint Changes
        run: |
          CRITICAL_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E 'okta|datto|zip|endpoints')
          if [[ -n "$CRITICAL_FILES" ]]; then
            echo "Critical endpoint changes detected. Skipping commit."
            exit 0
          fi

      - name: Run Quality Checks
        run: |
          npm run lint && npm run test
          if [[ $? -ne 0 ]]; then
            echo "Quality checks failed. Skipping commit."
            exit 1
          fi

      - name: Commit Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Stage only files that pass quality checks
          git add .
          
          # Check if there are changes to commit
          if [[ -n $(git status --porcelain) ]]; then
            # Generate commit message based on context
            if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
              COMMIT_MSG="auto: commit after deployment of ${{ github.event.workflow_run.name }}"
            else
              COMMIT_MSG="auto: commit after QA pass"
            fi
            
            git commit -m "$COMMIT_MSG"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Update Confluence (Weekly)
        if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0'
        run: |
          # Generate weekly summary
          CHANGES=$(git log --since="7 days ago" --pretty=format:"%h - %s (%cr)" --no-merges)
          SUMMARY="## Weekly Summary $(date +%Y-%m-%d)\n\n$CHANGES"
          
          # Update Confluence
          curl -X POST ${{ secrets.CONFLUENCE_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$SUMMARY\"}"

      - name: Notify on Success
        if: success()
        run: |
          echo "Auto-commit completed successfully"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Auto-commit failed" 