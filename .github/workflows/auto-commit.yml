name: Auto-Commit After Deployment

on:
  workflow_dispatch: # Manual trigger only (auto triggers disabled to control spend)

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    env:
      # Cloudflare platform credentials (dummy values for CI validation)
      CF_ACCOUNT_ID: dummy-cf-account-id-ci
      CLOUDFLARE_API_TOKEN: dummy-cloudflare-api-token-ci
      D1_DATABASE: ATLAS_ONBOARDING_DB
      KV_NAMESPACE: atlasit_kv
      R2_BUCKET: atlasit-evidence
      # Service API keys (dummy values for CI validation)
      ONBOARDING_API_KEY: dummy-onboarding-ci
      ORCHESTRATOR_API_KEY: dummy-orchestrator-ci
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Validate Environment
        run: npm run validate:env

      - name: Check for Active Deployment
        run: |
          if [[ -f .deploying ]]; then
            echo "Deployment in progress. Skipping commit."
            exit 0
          fi

      - name: Check for Critical Endpoint Changes
        run: |
          CRITICAL_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E 'okta|datto|zip|endpoints')
          if [[ -n "$CRITICAL_FILES" ]]; then
            echo "Critical endpoint changes detected. Skipping commit."
            exit 0
          fi

      - name: Run Quality Checks
        run: |
          npm run lint && npm run test
          if [[ $? -ne 0 ]]; then
            echo "Quality checks failed. Skipping commit."
            exit 1
          fi

      - name: Commit Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Stage only files that pass quality checks
          git add .

          # Check if there are changes to commit
          if [[ -n $(git status --porcelain) ]]; then
            COMMIT_MSG="auto: commit after manual QA run"
            git commit -m "${COMMIT_MSG}"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Notify on Success
        if: success()
        run: |
          echo "Auto-commit completed successfully"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Auto-commit failed"
