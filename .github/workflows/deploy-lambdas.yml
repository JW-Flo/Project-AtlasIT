name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - "lambdas/**"
      - "packages/shared/**"
      - "scripts/build-lambdas.mjs"
  workflow_dispatch:
    inputs:
      function:
        description: "Specific function to deploy (blank = all changed)"
        required: false
        type: string

concurrency:
  group: deploy-lambdas
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  detect-changes:
    name: Detect changed functions
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.changes.outputs.functions }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed Lambda functions
        id: changes
        run: |
          if [ -n "${{ inputs.function }}" ]; then
            echo "functions=[\"${{ inputs.function }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD -- lambdas/ | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          # If shared packages changed, deploy all functions
          SHARED_CHANGED=$(git diff --name-only HEAD~1 HEAD -- packages/shared/ | wc -l)
          if [ "$SHARED_CHANGED" -gt 0 ]; then
            CHANGED=$(ls lambdas/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "functions=$CHANGED" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Deploy ${{ matrix.function }}
    needs: detect-changes
    if: needs.detect-changes.outputs.functions != '[]' && needs.detect-changes.outputs.functions != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function: ${{ fromJSON(needs.detect-changes.outputs.functions) }}
      max-parallel: 5
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Lambda function
        run: |
          node scripts/build-lambdas.mjs --function ${{ matrix.function }}

      - name: Package Lambda
        run: |
          # Install pg runtime dependency for functions that use it
          if grep -q 'require.*"pg"' lambdas/${{ matrix.function }}/dist/handler.js 2>/dev/null; then
            echo "Including pg node_modules..."
            mkdir -p /tmp/pg-deps && cd /tmp/pg-deps
            echo '{"dependencies":{"pg":"^8"}}' > package.json
            npm install --production --silent
            cp -r node_modules lambdas/${{ matrix.function }}/dist/ 2>/dev/null || true
            cd -
          fi
          cd lambdas/${{ matrix.function }}/dist
          zip -r ../../../${{ matrix.function }}.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          ENV="${{ vars.DEPLOY_ENV || 'dev' }}"
          FUNCTION_NAME="atlasit-${{ matrix.function }}-${ENV}"
          echo "Deploying to ${FUNCTION_NAME}..."
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file "fileb://${{ matrix.function }}.zip" \
            --publish

      - name: Wait for update
        run: |
          ENV="${{ vars.DEPLOY_ENV || 'dev' }}"
          FUNCTION_NAME="atlasit-${{ matrix.function }}-${ENV}"
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"

  smoke-test:
    name: Post-deploy smoke test
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Health check
        run: |
          ENV="${{ vars.DEPLOY_ENV || 'dev' }}"
          API_URL=$(aws ssm get-parameter --name "/atlasit/${ENV}/api-gateway-url" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [ -n "$API_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" --max-time 10 || echo "000")
            echo "Health check: $API_URL/health → HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::warning::Health check returned $STATUS"
            fi
          else
            echo "::notice::API URL not found in SSM — skipping smoke test"
          fi
