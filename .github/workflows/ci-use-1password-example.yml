name: Example: use 1Password Connect in CI

on:
  workflow_dispatch:

jobs:
  build:
    name: Build with 1Password Connect (example)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate mappings (non-live)
        uses: ./.github/workflows/1password-secrets.yml
        with:
          mode: connect
          mapping-file: ops/secrets/op-map.json
          live-fetch: false

      - name: Load secrets from 1Password Connect
        uses: 1Password/load-secrets-action@v3
        with:
          export-env: |
            DATABASE_URL=op://vault/My App DB/password
            API_KEY=op://vault/My App/API Key/password
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.op_atlas_it_connect_server_pat }}

      - name: Use secrets (example)
        run: |
          echo "DB prefix: ${DATABASE_URL::8}***"
          echo "API_KEY length: ${#API_KEY}"
