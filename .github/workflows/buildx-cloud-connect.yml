name: buildx-cloud-connect

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-connect:
    name: Build & push 1Password Connect image (Docker Build Cloud)
    runs-on: ubuntu-latest
    concurrency:
      group: buildx-cloud-connect
      cancel-in-progress: true
    env:
      REGISTRY_USER: ${{ vars.DOCKER_USER }}
      IMAGE_NAME: op-atlas-it-connect-server
      DOCKER_REPO: ${{ vars.DOCKER_USER }}/op-atlas-it-connect-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx (cloud driver)
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "andre1933/op-atlas-it-connect-server"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REPO }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          builder: ${{ steps.meta.outputs.builder }}
          platforms: linux/amd64,linux/arm64
          provenance: false # can enable later; keep trial lean
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REPO }}:buildcache,mode=max

      - name: Summary
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "Pushed tags: ${{ steps.meta.outputs.tags }}"
          echo "Image: docker.io/${{ env.DOCKER_REPO }}"

      - name: Dry-run summary
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "PR build completed using cache-only (no push)."
          echo "Tags that would push: ${{ steps.meta.outputs.tags }}"

      # Optional SBOM & provenance attestation (disabled by default during trial)
      # - name: Generate SBOM
      #   run: |
      #     echo "Enable Syft or Docker buildx attest after trial acceptance."

# Notes:
# - Buildx Cloud driver used as per user request; endpoint must exist beforehand.
# - `DOCKER_PAT` should be a limited-scope token (repo:write + read); rotate post-trial.
# - Multi-arch builds every push; if cost/time is high, gate to tags only similar to existing build workflow.
# - Existing `build.yml` for GHCR retained; this workflow targets Docker Hub trial.
