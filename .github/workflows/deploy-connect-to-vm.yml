name: Deploy 1Password Connect to remote VM (SSH)

on:
  workflow_dispatch:
    inputs:
      container_port:
        description: "Port on the VM to publish the Connect UI (default 8080)"
        required: false
        default: "8080"
      host_port:
        description: "Host port to bind on the VM (default 8080)"
        required: false
        default: "8080"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Connect on remote VM via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "Stopping existing container if present"
            docker rm -f op-connect || true
            echo "Pulling latest 1Password Connect image"
            docker pull 1password/connect:latest
            echo "Running 1Password Connect (port ${{ github.event.inputs.host_port }} -> container ${{ github.event.inputs.container_port }})"
            docker run -d --name op-connect \
              -p ${GITHUB_WORKFLOW_HOST_PORT:-${{ github.event.inputs.host_port }}}:${GITHUB_WORKFLOW_CONTAINER_PORT:-${{ github.event.inputs.container_port }}} \
              -e OP_CONNECT_HOSTNAME=0.0.0.0 \
              -e OP_CONNECT_TOKEN="${OP_CONNECT_TOKEN}" \
              --restart unless-stopped \
              1password/connect:latest

        env:
          # The Connect server token (generated in 1Password Admin) must be set as a repository secret
          # named `OP_CONNECT_TOKEN` or `op_atlas_it_connect_server_pat`. For this workflow use OP_CONNECT_TOKEN.
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Post-deploy check
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "Checking Connect container status"
            docker ps --filter name=op-connect --format 'table {{.Names}}	{{.Status}}'

    # Required repository secrets (documented here so maintainers can add them before running):
    # - DEPLOY_HOST: host or IP of the VM
    # - DEPLOY_SSH_USER: ssh username
    # - DEPLOY_SSH_PORT: ssh port (usually 22)
    # - DEPLOY_SSH_PRIVATE_KEY: SSH private key content (no passphrase recommended for automation)
    # - OP_CONNECT_TOKEN: 1Password Connect token generated in 1Password Admin
