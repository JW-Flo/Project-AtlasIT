name: CI (autonomous 1Password automation token)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to allow automation token secret loading (optional manual run)"
        required: false
        default: "NO"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      OP_AUTOMATION_TOKEN: ${{ secrets.OP_AUTOMATION_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: "Guard: require OP_AUTOMATION_TOKEN"
        run: |
          if [ -z "${OP_AUTOMATION_TOKEN:-}" ]; then
            echo "OP_AUTOMATION_TOKEN secret missing; skipping secret load (continuing without secrets)." >&2
            exit 0
          fi

      - name: Install 1Password CLI
        run: |
          if [ -z "${OP_AUTOMATION_TOKEN:-}" ]; then
            echo "Skipping op CLI install (no token)"; exit 0; fi
          curl -sS https://downloads.1password.com/linux/arm64/stable/op.zip -o op.zip || true
          if [ ! -s op.zip ]; then
            curl -sS https://downloads.1password.com/linux/x86_64/stable/op.zip -o op.zip
          fi
          unzip -o op.zip -d opcli >/dev/null
          sudo mv opcli/op /usr/local/bin/op
          op --version || { echo 'Failed to install op CLI' >&2; exit 1; }

      - name: Load mapped secrets (automation token)
        run: |
          if [ -z "${OP_AUTOMATION_TOKEN:-}" ]; then echo "No token; skipping secret load"; exit 0; fi
          bash ci/load-automation-secrets.sh

      - name: Show loaded secret prefixes (debug)
        run: |
          if [ -z "${OP_AUTOMATION_TOKEN:-}" ]; then echo "No token; skipping prefixes"; exit 0; fi
          echo "Variables loaded:"
          jq -r '.mappings | keys | .[]' ops/secrets/op-map.json | while read -r k; do
            val="${!k:-}"
            [ -n "$val" ] && echo "$k=${val:0:6}***" || echo "$k=(empty)"
          done

      - name: Run build/test (example)
        run: |
          npm ci || true
          npm test --if-present || true

      - name: Optional manual secret load confirmation gate
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "Manual run did not confirm secret usage. (Secrets may already have been loaded automatically)." >&2
          fi

      - name: Post-run advisory
        run: |
          echo "Secret loading used automation token approach. Consider migrating to Connect/OIDC for reduced token exposure."

# SECURITY / RISK NOTES:
# - This workflow uses a long-lived automation token (OP_AUTOMATION_TOKEN) if present.
# - Scope the token minimally (least vault/item access) and rotate it regularly.
# - For production, prefer 1Password Connect + OIDC ephemeral tokens.
# - Guard rails: if token absent, workflow proceeds without secrets (non-failing). Manual dispatch can add confirm gate.
