name: atlasit-deploy
on:
  workflow_dispatch: # Manual trigger only (automated schedule & push disabled)

jobs:
  prereq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Removed all Mistral install/verify steps
      - name: Terraform Init & Apply Scaffold
        run: |
          terraform -chdir=terraform init
          terraform -chdir=terraform apply -auto-approve
      - name: Validate Terraform
        run: terraform -chdir=terraform plan

  urgent:
    needs: prereq
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ingest Jira → Okta
        run: scripts/ingest-jira.sh
      - name: Deploy Web UI
        run: scripts/deploy-webui.sh
      - name: Lock down Okta roles
        run: scripts/lockdown-okta.sh
      - name: Connect to Datto & RocketCyber
        run: scripts/ingest-alerts.sh
      - name: Init BigQuery/Firestore schema
        run: scripts/init-schema.sh

      - name: Log success
        if: success()
        run: echo "✅ AtlasIT deployment completed successfully."

      - name: Log failure
        if: failure()
        run: echo "❌ AtlasIT deployment failed. Check logs for details."

      - name: Verify deployment
        run: echo "Deployment steps completed."

  # … rest of jobs (dev, ci-scans, smoke, manual-approval, prod-deploy)
