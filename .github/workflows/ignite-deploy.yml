name: ignite-deploy
on:
  push:
    branches: [ main ]

jobs:
  prereq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init & Apply Scaffold
        run: |
          terraform -chdir=terraform init
          terraform -chdir=terraform apply -auto-approve
      - name: Validate Terraform
        run: terraform -chdir=terraform plan
      - name: Save job log
        if: always()
        run: |
          mkdir -p ci-logs
          echo "Job: ${{ github.job }} | Run ID: ${{ github.run_id }}" > ci-logs/${{ github.job }}-${{ github.run_id }}.log
          # Optionally append more detailed logs here
      - name: Install gsutil
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk
      - name: Authenticate to GCP
        if: failure()
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ignite-459301
      - name: Upload error log to GCS on failure
        if: failure()
        run: |
          gsutil cp ci-logs/${{ github.job }}-${{ github.run_id }}.log gs://ignite-459301-ci-errors/

  urgent:
    needs: prereq
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ingest Jira → Okta
        run: scripts/ingest-jira.sh
      - name: Deploy Web UI
        env:
          OKTA_DOMAIN: ${{ secrets.OKTA_DOMAIN }}
          OKTA_API_TOKEN_SA: ${{ secrets.OKTA_API_TOKEN_SA }}
          ROCKETCYBER_API_TOKEN: ${{ secrets.ROCKETCYBER_API_TOKEN }}
          DATTO_EDR_TOKEN: ${{ secrets.DATTO_EDR_TOKEN }}
          ZIP_API_KEY: ${{ secrets.ZIP_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          AWS_ACCESS_KEY_ID_SANDBOX: ${{ secrets.AWS_ACCESS_KEY_ID_SANDBOX }}
          AWS_SECRET_ACCESS_KEY_SANDBOX: ${{ secrets.AWS_SECRET_ACCESS_KEY_SANDBOX }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: scripts/deploy-webui.sh
      - name: Lock down Okta roles
        run: scripts/lockdown-okta.sh
      - name: Connect to Datto & RocketCyber
        env:
          OKTA_DOMAIN: ${{ secrets.OKTA_DOMAIN }}
          OKTA_API_TOKEN_SA: ${{ secrets.OKTA_API_TOKEN_SA }}
          ROCKETCYBER_API_TOKEN: ${{ secrets.ROCKETCYBER_API_TOKEN }}
          DATTO_EDR_TOKEN: ${{ secrets.DATTO_EDR_TOKEN }}
          ZIP_API_KEY: ${{ secrets.ZIP_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          AWS_ACCESS_KEY_ID_SANDBOX: ${{ secrets.AWS_ACCESS_KEY_ID_SANDBOX }}
          AWS_SECRET_ACCESS_KEY_SANDBOX: ${{ secrets.AWS_SECRET_ACCESS_KEY_SANDBOX }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: scripts/ingest-alerts.sh
      - name: Init BigQuery/Firestore schema
        run: scripts/init-schema.sh
      - name: Save job log
        if: always()
        run: |
          mkdir -p ci-logs
          echo "Job: ${{ github.job }} | Run ID: ${{ github.run_id }}" > ci-logs/${{ github.job }}-${{ github.run_id }}.log
          # Optionally append more detailed logs here
      - name: Install gsutil
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk
      - name: Authenticate to GCP
        if: failure()
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ignite-459301
      - name: Upload error log to GCS on failure
        if: failure()
        run: |
          gsutil cp ci-logs/${{ github.job }}-${{ github.run_id }}.log gs://ignite-459301-ci-errors/

  dev:
    needs: urgent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stub createGroup Function
        run: scripts/stub-create-group.sh
      - name: Save job log
        if: always()
        run: |
          mkdir -p ci-logs
          echo "Job: ${{ github.job }} | Run ID: ${{ github.run_id }}" > ci-logs/${{ github.job }}-${{ github.run_id }}.log
          # Optionally append more detailed logs here
      - name: Install gsutil
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk
      - name: Authenticate to GCP
        if: failure()
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ignite-459301
      - name: Upload error log to GCS on failure
        if: failure()
        run: |
          gsutil cp ci-logs/${{ github.job }}-${{ github.run_id }}.log gs://ignite-459301-ci-errors/

  ci-scans:
    needs: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Scanners
        run: |
          pip install checkov==2.0.763 tfsec==1.28.1
          npm install -g eslint@8.50.0 tflint@0.34.1
      - name: Run IaC Scans
        run: |
          checkov --directory terraform
          tfsec terraform
          tflint terraform
      - name: Run Lint
        run: eslint src/
      - name: Save job log
        if: always()
        run: |
          mkdir -p ci-logs
          echo "Job: ${{ github.job }} | Run ID: ${{ github.run_id }}" > ci-logs/${{ github.job }}-${{ github.run_id }}.log
          # Optionally append more detailed logs here
      - name: Install gsutil
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk
      - name: Authenticate to GCP
        if: failure()
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ignite-459301
      - name: Upload error log to GCS on failure
        if: failure()
        run: |
          gsutil cp ci-logs/${{ github.job }}-${{ github.run_id }}.log gs://ignite-459301-ci-errors/

  smoke:
    needs: ci-scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke_test.sh
        run: chmod +x scripts/smoke_test.sh && ./scripts/smoke_test.sh
      - name: Save job log
        if: always()
        run: |
          mkdir -p ci-logs
          echo "Job: ${{ github.job }} | Run ID: ${{ github.run_id }}" > ci-logs/${{ github.job }}-${{ github.run_id }}.log
          # Optionally append more detailed logs here
      - name: Install gsutil
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk
      - name: Authenticate to GCP
        if: failure()
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ignite-459301
      - name: Upload error log to GCS on failure
        if: failure()
        run: |
          gsutil cp ci-logs/${{ github.job }}-${{ github.run_id }}.log gs://ignite-459301-ci-errors/

  manual-approval:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Await manual sign-off
        run: |
          echo "Manual approval required. Please approve this job in the GitHub Actions UI to proceed with production deployment."
          echo "If you are an authorized approver, click 'Approve and run' above."
      - name: Save job log
        if: always()
        run: |
          mkdir -p ci-logs
          echo "Job: ${{ github.job }} | Run ID: ${{ github.run_id }}" > ci-logs/${{ github.job }}-${{ github.run_id }}.log
          # Optionally append more detailed logs here
      - name: Install gsutil
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk
      - name: Authenticate to GCP
        if: failure()
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ignite-459301
      - name: Upload error log to GCS on failure
        if: failure()
        run: |
          gsutil cp ci-logs/${{ github.job }}-${{ github.run_id }}.log gs://ignite-459301-ci-errors/

  prod-deploy:
    needs: manual-approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Blue/Green Deploy
        run: scripts/prod-deploy.sh
      - name: Save job log
        if: always()
        run: |
          mkdir -p ci-logs
          echo "Job: ${{ github.job }} | Run ID: ${{ github.run_id }}" > ci-logs/${{ github.job }}-${{ github.run_id }}.log
          # Optionally append more detailed logs here
      - name: Install gsutil
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk
      - name: Authenticate to GCP
        if: failure()
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ignite-459301
      - name: Upload error log to GCS on failure
        if: failure()
        run: |
          gsutil cp ci-logs/${{ github.job }}-${{ github.run_id }}.log gs://ignite-459301-ci-errors/
