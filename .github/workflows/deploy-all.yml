name: Deploy All Workers

on:
  workflow_dispatch:
    inputs:
      workers:
        description: "Comma-separated workers to deploy (or 'all')"
        required: false
        default: "all"

jobs:
  deploy-console:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'console')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm install --no-fund --no-audit
        working-directory: console-app
      - run: npm run build
        working-directory: console-app
      - run: npx wrangler deploy --config console-app/wrangler.toml

  deploy-compliance:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'compliance')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm ci --no-fund --no-audit
        working-directory: compliance-worker
      - run: npx wrangler deploy
        working-directory: compliance-worker

  deploy-orchestrator:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'orchestrator')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx wrangler deploy ai-orchestrator/index.js --name ai-orchestrator

  smoke-test:
    needs: [deploy-console, deploy-compliance, deploy-orchestrator]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test all endpoints
        run: |
          echo "=== Console ==="
          curl -sS -o /dev/null -w "%{http_code}" "https://atlasit-console.pages.dev" || echo "unreachable"

          echo ""
          echo "=== Compliance Health ==="
          curl -sS -o /dev/null -w "%{http_code}" "https://atlasit-compliance-worker.kd8jc7v8cd.workers.dev/api/compliance/health" || echo "unreachable"

          echo ""
          echo "=== Orchestrator Health ==="
          curl -sS -o /dev/null -w "%{http_code}" "https://ai-orchestrator.kd8jc7v8cd.workers.dev/health" || echo "unreachable"
