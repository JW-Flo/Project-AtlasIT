name: Deploy All Workers

on:
  workflow_dispatch:
    inputs:
      workers:
        description: "Comma-separated workers to deploy (or 'all')"
        required: false
        default: "all"

jobs:
  deploy-core:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'core')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check pending migrations (atlas_core_db)
        run: |
          pending=$(npx wrangler d1 migrations list atlas_core_db --config wrangler.toml 2>&1 | grep -c "pending" || true)
          if [ "$pending" -gt 0 ]; then
            echo "::warning::$pending pending migration(s) detected for atlas_core_db. Apply before deploying."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npx wrangler deploy --config wrangler.toml

  deploy-console:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'console')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm install --no-frozen-lockfile
        working-directory: console-app
      - run: pnpm run build && touch .svelte-kit/cloudflare/.assetsignore
        working-directory: console-app
      - run: npx wrangler deploy --config console-app/wrangler.toml

  deploy-compliance:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'compliance')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm install --no-frozen-lockfile
        working-directory: compliance-worker
      - name: Check pending migrations (atlasit_compliance)
        run: |
          pending=$(npx wrangler d1 migrations list atlasit_compliance --config compliance-worker/wrangler.toml 2>&1 | grep -c "pending" || true)
          if [ "$pending" -gt 0 ]; then
            echo "::warning::$pending pending migration(s) detected for atlasit_compliance. Apply before deploying."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npx wrangler deploy --config compliance-worker/wrangler.toml

  deploy-orchestrator:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'orchestrator')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check pending migrations (ATLAS_CORE_DB via orchestrator)
        run: |
          pending=$(npx wrangler d1 migrations list ATLAS_CORE_DB --config ai-orchestrator/wrangler.toml 2>&1 | grep -c "pending" || true)
          if [ "$pending" -gt 0 ]; then
            echo "::warning::$pending pending migration(s) detected for ATLAS_CORE_DB. Apply before deploying."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npx wrangler deploy --config ai-orchestrator/wrangler.toml

  deploy-dispatch:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'dispatch')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm install --no-frozen-lockfile
        working-directory: dispatch-worker
      - run: npx wrangler deploy --config dispatch-worker/wrangler.toml

  smoke-test:
    needs: [deploy-core, deploy-console, deploy-compliance, deploy-orchestrator, deploy-dispatch]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test all endpoints
        run: |
          bash scripts/smoke-test.sh core-api https://api.atlasit.pro
          bash scripts/smoke-test.sh console-app https://www.atlasit.pro
          bash scripts/smoke-test.sh compliance-worker https://compliance.atlasit.pro
          bash scripts/smoke-test.sh ai-orchestrator https://orchestrator.atlasit.pro
          bash scripts/smoke-test.sh dispatch-worker https://dispatch.atlasit.pro
