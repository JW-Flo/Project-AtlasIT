name: Deploy All Workers

on:
  workflow_dispatch:
    inputs:
      workers:
        description: "Comma-separated workers to deploy (or 'all')"
        required: false
        default: "all"

concurrency:
  group: deploy-all
  cancel-in-progress: true

jobs:
  migrate-shared-db:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply shared DB migrations (atlasit-shared)
        run: npx wrangler d1 migrations apply atlasit-shared --config wrangler-shared-db.toml --remote

  deploy-core:
    needs: [migrate-shared-db]
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'core')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check pending migrations (atlas_core_db)
        run: |
          pending=$(npx wrangler d1 migrations list atlas_core_db --config wrangler.toml 2>&1 | grep -c "pending" || true)
          if [ "$pending" -gt 0 ]; then
            echo "::warning::$pending pending migration(s) detected for atlas_core_db. Apply before deploying."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npx wrangler deploy --config wrangler.toml

  deploy-console:
    needs: [migrate-shared-db]
    if: >-
      always() && (
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'console'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm install --no-frozen-lockfile
        working-directory: console-app
      - name: Build shared package
        run: pnpm run --filter @atlasit/shared build
      - run: pnpm run build && touch .svelte-kit/cloudflare/.assetsignore
        working-directory: console-app
      - run: npx wrangler deploy --config console-app/wrangler.toml

  deploy-compliance:
    needs: [migrate-shared-db]
    if: >-
      always() && (
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'compliance'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm install --no-frozen-lockfile
        working-directory: compliance-worker
      - name: Apply D1 migrations (atlasit_compliance)
        run: npx wrangler d1 migrations apply atlasit_compliance --config compliance-worker/wrangler.toml --remote
      - run: npx wrangler deploy --config compliance-worker/wrangler.toml

  deploy-orchestrator:
    needs: [migrate-shared-db]
    if: >-
      always() && (
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'orchestrator'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm run --filter @atlasit/shared build
      - run: npx wrangler deploy --config ai-orchestrator/wrangler.toml

  deploy-dispatch:
    if: >-
      github.event.inputs.workers == 'all' ||
      contains(github.event.inputs.workers, 'dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply atlasit-shared --config dispatch-worker/wrangler.toml --remote
      - run: npx wrangler deploy --config dispatch-worker/wrangler.toml

  smoke-test:
    needs: [migrate-shared-db, deploy-core, deploy-console, deploy-compliance, deploy-orchestrator, deploy-dispatch]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test all endpoints
        run: |
          bash scripts/smoke-test.sh core-api https://api.atlasit.pro
          bash scripts/smoke-test.sh console-app https://www.atlasit.pro
          bash scripts/smoke-test.sh compliance-worker https://compliance.atlasit.pro
          bash scripts/smoke-test.sh ai-orchestrator https://orchestrator.atlasit.pro
          bash scripts/smoke-test.sh dispatch-worker https://dispatch.atlasit.pro || true
