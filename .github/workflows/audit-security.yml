name: Audit Security

on:
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install production dependencies
        run: npm install --omit=dev
      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
      - name: License gate placeholder
        run: echo "Placeholder: integrate license scanner hook once dependency matrix stabilises."
