name: ci

on:
  workflow_dispatch:
  # Build only on release tags to save CI minutes (multi-arch). Use manual dispatch for dev builds.
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    concurrency:
      group: build-op-atlas-it
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use the repo's well-scoped Personal Access Token stored in `secrets.PAT_TOKEN`.
          # Required scopes: write:packages (or package write permissions) and repo if pushing to a private org repo.
          password: ${{ secrets.PAT_TOKEN }}

      - name: Set up Docker Buildx (docker-container driver)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/op-atlas-it-connect-server:latest
          # Default to single-arch (linux/amd64) to save time/cost. Build multi-arch only for release tags (v*).
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/op-atlas-it-connect-server:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/op-atlas-it-connect-server:buildcache,mode=max

      - name: Verify pushed image (optional)
        run: |
          echo "If the job succeeds, the image should be available at ghcr.io/${{ github.repository_owner }}/op-atlas-it-connect-server:latest"

# Security notes:
# - Store Docker credentials in repo secrets (DOCKER_PAT) and set vars.DOCKER_USER at the repo level.
# - DO NOT reuse the Connect server token for Docker Hub; store registry PATs separately and rotate them.
