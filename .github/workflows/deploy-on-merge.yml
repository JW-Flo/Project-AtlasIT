      - name: Deploy
        run: npx wrangler deploy --config onboarding/wrangler.toml --env production

  deploy-slack-agent:
    name: Deploy slack-notification-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config slack-notification-agent/wrangler.toml

  deploy-dispatch:
    needs: [migrate-shared-db]
    name: Deploy dispatch-worker
    runs-on: ubuntu-latest

    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install dispatch-worker deps
        run: pnpm install --no-frozen-lockfile
        working-directory: dispatch-worker
      - name: Deploy
        run: npx wrangler deploy --config dispatch-worker/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh dispatch-worker https://dispatch.atlasit.pro

  # ── Core Adapter Workers ─────────────────────────────────────────────────────
  # Adapters are standalone (not in pnpm workspaces). They depend only on hono
  # and some import directly from packages/shared/src via relative paths, so
  # the shared package must be built first.

  deploy-adapter-github:
    needs: [migrate-shared-db]
    name: Deploy adapter — github
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: rm -rf dist tsconfig.tsbuildinfo && npx tsc -p tsconfig.json
        working-directory: packages/shared
      - name: Install adapter deps
        run: pnpm install --no-frozen-lockfile
        working-directory: adapters/github
      - name: Deploy
        run: npx wrangler deploy --config adapters/github/wrangler.toml

