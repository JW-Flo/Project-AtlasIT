name: Deploy on Merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-on-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
      console: ${{ steps.filter.outputs.console }}
      workers: ${{ steps.filter.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - 'migrations/**'
            console:
              - 'console-app/**'
              - 'packages/shared/**'
            workers:
              - 'core-api/**'
              - 'ai-orchestrator/**'
              - 'compliance-worker/**'
              - 'onboarding/**'
              - 'packages/shared/**'

  run-migrations:
    needs: [changes]
    if: needs.changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch'
    name: Run DB migrations (Neon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply new migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AM HEAD^ HEAD -- 'migrations/*.sql' | sort)
          if [ -z "$CHANGED" ]; then
            echo "No new migrations — skipping"
            exit 0
          fi
          npm install --save-dev @neondatabase/serverless 2>/dev/null
          for SQL_FILE in $CHANGED; do
            echo "=== Applying $SQL_FILE ==="
            node -e "
              const { neon } = require('@neondatabase/serverless');
              const sql = neon(process.env.DATABASE_URL);
              const fs = require('fs');
              const stmts = fs.readFileSync('$SQL_FILE','utf8')
                .split(';').map(s=>s.trim()).filter(s=>s && !s.split('\\n').every(l=>l.trim().startsWith('--')));
              Promise.all(stmts.map(s=>sql(s))).then(()=>console.log('OK')).catch(e=>{console.error(e);process.exit(1)});
            "
          done

  deploy-console:
    needs: [changes]
    if: needs.changes.outputs.console == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy Console Worker (CF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: cd packages/shared && rm -rf dist tsconfig.tsbuildinfo && npx tsc -p tsconfig.json
      - name: Build console
        working-directory: console-app
        run: npx svelte-kit sync && pnpm run build
      - name: Deploy to Cloudflare Workers
        working-directory: console-app
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-workers:
    needs: [changes]
    if: needs.changes.outputs.workers == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy CF Workers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [core-api, ai-orchestrator, compliance-worker, onboarding]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: cd packages/shared && rm -rf dist tsconfig.tsbuildinfo && npx tsc -p tsconfig.json
      - name: Deploy ${{ matrix.worker }}
        run: cd ${{ matrix.worker }} && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
