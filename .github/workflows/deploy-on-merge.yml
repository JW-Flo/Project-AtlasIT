name: Deploy on Merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-on-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
      root-worker: ${{ steps.filter.outputs.root-worker }}
      core-api: ${{ steps.filter.outputs.core-api }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      compliance: ${{ steps.filter.outputs.compliance }}
      console: ${{ steps.filter.outputs.console }}
      onboarding: ${{ steps.filter.outputs.onboarding }}
      slack-agent: ${{ steps.filter.outputs.slack-agent }}
      dispatch: ${{ steps.filter.outputs.dispatch }}
      adapter-github: ${{ steps.filter.outputs.adapter-github }}
      adapter-okta: ${{ steps.filter.outputs.adapter-okta }}
      adapter-slack: ${{ steps.filter.outputs.adapter-slack }}
      adapter-microsoft-365: ${{ steps.filter.outputs.adapter-microsoft-365 }}
      adapter-aws: ${{ steps.filter.outputs.adapter-aws }}
      adapter-google-workspace: ${{ steps.filter.outputs.adapter-google-workspace }}
      adapter-zscaler: ${{ steps.filter.outputs.adapter-zscaler }}
      docs: ${{ steps.filter.outputs.docs }}
      apex-redirect: ${{ steps.filter.outputs.apex-redirect }}
      email: ${{ steps.filter.outputs.email }}
      slack-approval: ${{ steps.filter.outputs.slack-approval }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
      marketplace: ${{ steps.filter.outputs.marketplace }}
      aws-lambdas: ${{ steps.filter.outputs.aws-lambdas }}
      aws-console: ${{ steps.filter.outputs.aws-console }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            migrations:
              - 'migrations/**'
              - 'compliance-worker/migrations/**'
              - 'wrangler-shared-db.toml'
            root-worker:
              - 'src/**'
              - 'wrangler.toml'
            core-api:
              - 'core-api/**'
              - 'packages/shared/**'
            orchestrator:
              - 'ai-orchestrator/**'
              - 'packages/shared/**'
            compliance:
              - 'compliance-worker/**'
              - 'packages/shared/**'
            console:
              - 'console-app/**'
              - 'packages/shared/**'
            onboarding:
              - 'onboarding/**'
            slack-agent:
              - 'slack-notification-agent/**'
            dispatch:
              - 'dispatch-worker/**'
              - 'packages/shared/**'
            adapter-github:
              - 'adapters/github/**'
              - 'packages/shared/**'
            adapter-okta:
              - 'adapters/okta/**'
              - 'packages/shared/**'
            adapter-slack:
              - 'adapters/slack/**'
              - 'packages/shared/**'
            adapter-microsoft-365:
              - 'adapters/microsoft-365/**'
              - 'packages/shared/**'
            adapter-aws:
              - 'adapters/aws/**'
              - 'packages/shared/**'
            adapter-google-workspace:
              - 'adapters/google-workspace/**'
              - 'packages/shared/**'
            adapter-zscaler:
              - 'adapters/zscaler/**'
              - 'packages/shared/**'
            docs:
              - 'documentation-worker/**'
            apex-redirect:
              - 'apex-redirect-worker/**'
            email:
              - 'email-worker/**'
            slack-approval:
              - 'slack-approval-worker/**'
            scheduler:
              - 'scheduler-worker/**'
            marketplace:
              - 'marketplace/**'
            aws-lambdas:
              - 'lambdas/**'
              - 'packages/shared/**'
              - 'scripts/build-lambdas.mjs'
            aws-console:
              - 'console-app/**'
              - 'packages/shared/**'

  migrate-shared-db:
    needs: [changes]
    if: needs.changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch'
    name: Apply shared DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply D1 migrations (atlasit-shared)
        run: npx wrangler d1 migrations apply atlasit-shared --config wrangler-shared-db.toml --remote
      - name: Apply D1 migrations (atlasit_compliance)
        run: npx wrangler d1 migrations apply atlasit_compliance --config compliance-worker/wrangler.toml --remote

  deploy-root-worker:
    needs: [changes]
    if: needs.changes.outputs.root-worker == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy root worker (atlasit-core)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config wrangler.toml --env core
      # Smoke test skipped: root worker no longer routed to api.atlasit.pro
      # (core-api handles that domain). Root worker deploys to workers.dev only.

  deploy-core-api:
    needs: [changes]
    if: needs.changes.outputs.core-api == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy core-api (Hono)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm run build
        working-directory: packages/shared
      - name: Install core-api deps
        run: pnpm install --no-frozen-lockfile
        working-directory: core-api
      - name: Deploy
        run: npx wrangler deploy --config core-api/wrangler.toml --env production

  deploy-orchestrator:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.orchestrator == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy ai-orchestrator
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm run build
        working-directory: packages/shared
      - name: Install ai-orchestrator deps
        run: pnpm install --no-frozen-lockfile
        working-directory: ai-orchestrator
      - name: Ensure queue exists
        run: npx wrangler queues create atlasit-step-tasks || true
      - name: Deploy
        run: npx wrangler deploy --config ai-orchestrator/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh ai-orchestrator https://orchestrator.atlasit.pro

  deploy-compliance:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.compliance == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy compliance-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install compliance-worker deps
        run: pnpm install --no-frozen-lockfile
        working-directory: compliance-worker
      - name: Deploy
        run: npx wrangler deploy --config compliance-worker/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh compliance-worker https://compliance.atlasit.pro

  deploy-console:
    needs: [changes]
    if: needs.changes.outputs.console == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy console-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm run build
        working-directory: packages/shared
      - name: Install console deps
        run: pnpm install --no-frozen-lockfile
        working-directory: console-app
      - name: Build
        run: pnpm run build && touch .svelte-kit/cloudflare/.assetsignore
        working-directory: console-app
      - name: Deploy
        run: npx wrangler deploy --config console-app/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh console-app https://www.atlasit.pro

  deploy-onboarding:
    needs: [changes]
    if: needs.changes.outputs.onboarding == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy onboarding
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config onboarding/wrangler.toml --env production

  deploy-slack-agent:
    needs: [changes]
    if: needs.changes.outputs.slack-agent == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy slack-notification-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config slack-notification-agent/wrangler.toml

  deploy-dispatch:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.dispatch == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy dispatch-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install dispatch-worker deps
        run: pnpm install --no-frozen-lockfile
        working-directory: dispatch-worker
      - name: Deploy
        run: npx wrangler deploy --config dispatch-worker/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh dispatch-worker https://dispatch.atlasit.pro

  # ── Core Adapter Workers ─────────────────────────────────────────────────────
  # Adapters are standalone (not in pnpm workspaces). They depend only on hono
  # and some import directly from packages/shared/src via relative paths, so
  # the shared package must be built first.

  deploy-adapter-github:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.adapter-github == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy adapter — github
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: rm -rf dist tsconfig.tsbuildinfo && npx tsc -p tsconfig.json
        working-directory: packages/shared
      - name: Install adapter deps
        run: pnpm install --no-frozen-lockfile
        working-directory: adapters/github
      - name: Deploy
        run: npx wrangler deploy --config adapters/github/wrangler.toml

  deploy-adapter-okta:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.adapter-okta == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy adapter — okta
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install adapter deps
        run: pnpm install --no-frozen-lockfile
        working-directory: adapters/okta
      - name: Deploy
        run: npx wrangler deploy --config adapters/okta/wrangler.toml

  deploy-adapter-slack:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.adapter-slack == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy adapter — slack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install adapter deps
        run: pnpm install --no-frozen-lockfile
        working-directory: adapters/slack
      - name: Deploy
        run: npx wrangler deploy --config adapters/slack/wrangler.toml

  deploy-adapter-microsoft-365:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.adapter-microsoft-365 == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy adapter — microsoft-365
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install adapter deps
        run: pnpm install --no-frozen-lockfile
        working-directory: adapters/microsoft-365
      - name: Deploy
        run: npx wrangler deploy --config adapters/microsoft-365/wrangler.toml

  deploy-adapter-aws:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.adapter-aws == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy adapter — aws
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install adapter deps
        run: pnpm install --no-frozen-lockfile
        working-directory: adapters/aws
      - name: Deploy
        run: npx wrangler deploy --config adapters/aws/wrangler.toml

  deploy-adapter-google-workspace:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.adapter-google-workspace == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy adapter — google-workspace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: rm -rf dist tsconfig.tsbuildinfo && npx tsc -p tsconfig.json
        working-directory: packages/shared
      - name: Install adapter deps
        run: pnpm install --no-frozen-lockfile
        working-directory: adapters/google-workspace
      - name: Deploy
        run: npx wrangler deploy --config adapters/google-workspace/wrangler.toml

  deploy-adapter-zscaler:
    needs: [changes, migrate-shared-db]
    if: |
      always() &&
      (needs.migrate-shared-db.result == 'success' || needs.migrate-shared-db.result == 'skipped') &&
      (needs.changes.outputs.adapter-zscaler == 'true' || github.event_name == 'workflow_dispatch')
    name: Deploy adapter — zscaler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
