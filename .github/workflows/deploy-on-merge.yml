name: Deploy on Merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-on-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-shared-db:
    name: Apply shared DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply D1 migrations (atlasit-shared)
        run: npx wrangler d1 migrations apply atlasit-shared --config wrangler-shared-db.toml --remote
      - name: Apply D1 migrations (atlasit_compliance)
        run: npx wrangler d1 migrations apply atlasit_compliance --config compliance-worker/wrangler.toml --remote

  deploy-root-worker:
    needs: [migrate-shared-db]
    name: Deploy root worker (atlasit-core)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config wrangler.toml --env core
      # Smoke test skipped: root worker no longer routed to api.atlasit.pro
      # (core-api handles that domain). Root worker deploys to workers.dev only.

  deploy-core-api:
    name: Deploy core-api (Hono)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm run build
        working-directory: packages/shared
      - name: Install core-api deps
        run: pnpm install --no-frozen-lockfile
        working-directory: core-api
      - name: Deploy
        run: npx wrangler deploy --config core-api/wrangler.toml --env production

  deploy-orchestrator:
    needs: [migrate-shared-db]
    name: Deploy ai-orchestrator
    runs-on: ubuntu-latest

    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm run build
        working-directory: packages/shared
      - name: Install ai-orchestrator deps
        run: pnpm install --no-frozen-lockfile
        working-directory: ai-orchestrator
      - name: Ensure queue exists
        run: npx wrangler queues create atlasit-step-tasks || true
      - name: Deploy
        run: npx wrangler deploy --config ai-orchestrator/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh ai-orchestrator https://orchestrator.atlasit.pro

  deploy-compliance:
    needs: [migrate-shared-db]
    name: Deploy compliance-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install compliance-worker deps
        run: pnpm install --no-frozen-lockfile
        working-directory: compliance-worker
      - name: Deploy
        run: npx wrangler deploy --config compliance-worker/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh compliance-worker https://compliance.atlasit.pro

  deploy-console:
    name: Deploy console-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm run build
        working-directory: packages/shared
      - name: Install console deps
        run: pnpm install --no-frozen-lockfile
        working-directory: console-app
      - name: Build
        run: pnpm run build && touch .svelte-kit/cloudflare/.assetsignore
        working-directory: console-app
      - name: Deploy
        run: npx wrangler deploy --config console-app/wrangler.toml
      - name: Smoke test
        run: bash scripts/smoke-test.sh console-app https://www.atlasit.pro

  deploy-onboarding:
    name: Deploy onboarding
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
