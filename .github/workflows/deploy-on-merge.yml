name: Deploy on Merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-on-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
      aws-lambdas: ${{ steps.filter.outputs.aws-lambdas }}
      aws-console: ${{ steps.filter.outputs.aws-console }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            migrations:
              - 'migrations/**'
            aws-lambdas:
              - 'lambdas/**'
              - 'packages/shared/**'
              - 'packages/connector-schema/**'
              - 'scripts/build-lambdas.mjs'
            aws-console:
              - 'console-app/**'
              - 'packages/shared/**'

  migrate-shared-db:
    needs: [changes]
    if: needs.changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch'
    name: Apply PG migrations (Aurora)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: us-east-1
      - name: Apply new PG migrations via migration-runner Lambda
        run: |
          # Find .sql files in migrations/ changed in this push
          CHANGED=$(git diff --name-only --diff-filter=AM HEAD^ HEAD -- 'migrations/*.sql' | sort)
          if [ -z "$CHANGED" ]; then
            echo "No migration files changed in this push — skipping"
            exit 0
          fi
          echo "New/changed migrations:"
          echo "$CHANGED"
          echo ""
          FAILED=0
          for SQL_FILE in $CHANGED; do
            echo "=== Applying $SQL_FILE ==="
            PAYLOAD=$(node -e "
              const fs = require('fs');
              const sql = fs.readFileSync('$SQL_FILE', 'utf8');
              const stmts = sql.split(';').map(s => s.trim())
                .filter(s => s && !s.split('\n').every(l => l.trim().startsWith('--')));
              console.log(JSON.stringify({ statements: stmts }));
            ")
            RESULT=$(aws lambda invoke \
              --function-name atlasit-migration-runner \
              --cli-binary-format raw-in-base64-out \
              --payload "$PAYLOAD" \
              /tmp/mig-result.json 2>&1)
            echo "$RESULT"
            if grep -q '"ok":false' /tmp/mig-result.json; then
              echo "::error file=$SQL_FILE::migration failed — see preview below"
              cat /tmp/mig-result.json
              FAILED=$((FAILED + 1))
            else
              echo "OK"
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED migration(s) failed"
            exit 1
          fi


  # ── All Cloudflare deploy jobs removed 2026-04-13 ──────────────────────
  # (deploy-root-worker, deploy-core-api, deploy-orchestrator, deploy-compliance,
  # deploy-onboarding, deploy-slack-agent, deploy-dispatch, deploy-adapter-*,
  # deploy-docs, deploy-apex-redirect, deploy-email, deploy-slack-approval,
  # deploy-scheduler, deploy-marketplace). The CF stack has been replaced by
  # AWS Lambda + S3+CloudFront. Legacy source dirs (core-api/, ai-orchestrator/,
  # compliance-worker/, etc.) are retained for reference but not redeployed.

  # ── AWS Lambda Functions ─────────────────────────────────────────────────
  deploy-aws-lambdas:
    needs: [changes]
    if: needs.changes.outputs.aws-lambdas == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy AWS Lambdas
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all Lambda functions
        run: node scripts/build-lambdas.mjs
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: us-east-1
      - name: Deploy changed Lambdas
        run: |
          ENV="${{ vars.DEPLOY_ENV || 'dev' }}"
          for dir in lambdas/*/; do
            FUNC=$(basename "$dir")
            FUNCTION_NAME="atlasit-${FUNC}-${ENV}"
            echo "Packaging ${FUNC}..."
            cd "${dir}dist"
            if grep -q 'require.*"pg"' handler.js 2>/dev/null; then
              mkdir -p /tmp/pg-deps && cd /tmp/pg-deps
              echo '{"dependencies":{"pg":"^8"}}' > package.json
              npm install --production --silent
              cp -r node_modules "${GITHUB_WORKSPACE}/${dir}dist/"
              cd "${GITHUB_WORKSPACE}/${dir}dist"
            fi
            if grep -q 'require.*"bcryptjs"' handler.js 2>/dev/null; then
              mkdir -p /tmp/bcrypt-deps && cd /tmp/bcrypt-deps
              echo '{"dependencies":{"bcryptjs":"^2.4.3"}}' > package.json
              npm install --production --silent
              cp -r node_modules "${GITHUB_WORKSPACE}/${dir}dist/"
              cd "${GITHUB_WORKSPACE}/${dir}dist"
            fi
            if grep -q 'require.*"pdf-lib"' handler.js 2>/dev/null; then
              mkdir -p /tmp/pdflib-deps && cd /tmp/pdflib-deps
              echo '{"dependencies":{"pdf-lib":"^1.17.1"}}' > package.json
              npm install --production --silent
              cp -r node_modules "${GITHUB_WORKSPACE}/${dir}dist/"
              cd "${GITHUB_WORKSPACE}/${dir}dist"
            fi
            zip -r "/tmp/${FUNC}.zip" .
            cd "${GITHUB_WORKSPACE}"
            echo "Deploying ${FUNCTION_NAME}..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file "fileb:///tmp/${FUNC}.zip" \
              --publish || echo "::warning::Failed to deploy ${FUNC}"
          done
      - name: Prune old Lambda versions (keep last 5)
        run: |
          ENV="${{ vars.DEPLOY_ENV || 'dev' }}"
          for dir in lambdas/*/; do
            FUNC=$(basename "$dir")
            FUNCTION_NAME="atlasit-${FUNC}-${ENV}"
            # List versions except $LATEST, sorted numerically descending, skip top 5, delete rest
            aws lambda list-versions-by-function \
              --function-name "$FUNCTION_NAME" \
              --query 'Versions[?Version!=`$LATEST`].Version' \
              --output text 2>/dev/null \
              | tr '\t' '\n' \
              | sort -rn \
              | tail -n +6 \
              | while read VER; do
                  [ -z "$VER" ] && continue
                  echo "Deleting ${FUNCTION_NAME}:${VER}"
                  aws lambda delete-function \
                    --function-name "$FUNCTION_NAME" \
                    --qualifier "$VER" 2>/dev/null || true
                done
          done

      - name: Health check
        run: |
          API_URL=$(aws ssm get-parameter --name "/atlasit/dev/api-gateway-url" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [ -n "$API_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" --max-time 10 || echo "000")
            echo "Health: $API_URL/health → HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::warning::Health check returned $STATUS"
            fi
          fi

  # ── AWS Console (Lambda SSR with adapter-node) ───────────────────────────
  deploy-aws-console:
    needs: [changes]
    if: needs.changes.outputs.aws-console == 'true' || github.event_name == 'workflow_dispatch'
    name: Deploy Console Lambda (SSR)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: cd packages/shared && rm -rf dist tsconfig.tsbuildinfo && npx tsc -p tsconfig.json
      - name: Build console (adapter-node for Lambda)
        working-directory: console-app
        run: |
          cp svelte.config.js svelte.config.backup.js
          cp svelte.config.lambda.js svelte.config.js
          npx svelte-kit sync && pnpm run build
          mv svelte.config.backup.js svelte.config.js
        env:
          VITE_API_URL: https://ahjoepuw96.execute-api.us-east-1.amazonaws.com
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::457335975503:role/atlasit-github-actions-deploy
          aws-region: us-east-1
      - name: Package and deploy console Lambda
        run: |
          ENV="${{ vars.DEPLOY_ENV || 'dev' }}"
          FUNCTION_NAME="atlasit-console-api-${ENV}"

          cd console-app/build-lambda

          # Add pg dependency (ES module mode for adapter-node output)
          echo '{"type":"module","dependencies":{"pg":"^8.12.0"}}' > package.json
          npm install --production --silent

          # Package
          zip -r /tmp/console-api.zip .

          # Deploy
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file "fileb:///tmp/console-api.zip" \
            --publish

          echo "Console Lambda deployed: $FUNCTION_NAME"
      - name: Health check
        run: |
          ENV="${{ vars.DEPLOY_ENV || 'dev' }}"
          FUNCTION_URL=$(aws lambda get-function-url-config --function-name "atlasit-console-api-${ENV}" --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          if [ -n "$FUNCTION_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${FUNCTION_URL}api/health" --max-time 10 || echo "000")
            echo "Health: ${FUNCTION_URL}api/health → HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::warning::Console health check returned $STATUS"
            fi
          fi
