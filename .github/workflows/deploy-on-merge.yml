name: Deploy on Merge

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

concurrency:
  group: deploy-on-merge-${{ github.sha }}
  cancel-in-progress: true

jobs:
  deploy-root-worker:
    name: Deploy root worker (atlasit-core)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config wrangler.toml
      - name: Smoke test
        continue-on-error: true
        run: bash scripts/smoke-test.sh root-worker https://api.atlasit.pro

  deploy-core-api:
    name: Deploy core-api (Hono)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config core-api/wrangler.toml --env production

  deploy-orchestrator:
    name: Deploy ai-orchestrator
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ensure queue exists
        run: npx wrangler queues create atlasit-step-tasks || true
      - name: Deploy
        run: npx wrangler deploy --config ai-orchestrator/wrangler.toml
      - name: Smoke test
        continue-on-error: true
        run: bash scripts/smoke-test.sh ai-orchestrator https://orchestrator.atlasit.pro

  deploy-compliance:
    name: Deploy compliance-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install compliance-worker deps
        run: pnpm install --no-frozen-lockfile
        working-directory: compliance-worker
      - name: Deploy
        run: npx wrangler deploy --config compliance-worker/wrangler.toml
      - name: Smoke test
        continue-on-error: true
        run: bash scripts/smoke-test.sh compliance-worker https://compliance.atlasit.pro

  deploy-console:
    name: Deploy console-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install console deps
        run: pnpm install --no-frozen-lockfile
        working-directory: console-app
      - name: Build
        run: pnpm run build && touch .svelte-kit/cloudflare/.assetsignore
        working-directory: console-app
      - name: Deploy
        run: npx wrangler deploy --config console-app/wrangler.toml
      - name: Smoke test
        continue-on-error: true
        run: bash scripts/smoke-test.sh console-app https://www.atlasit.pro

  deploy-onboarding:
    name: Deploy onboarding
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config onboarding/wrangler.toml --env production

  deploy-slack-agent:
    name: Deploy slack-notification-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        run: npx wrangler deploy --config slack-notification-agent/wrangler.toml

  deploy-dispatch:
    name: Deploy dispatch-worker
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install dispatch-worker deps
        run: pnpm install --no-frozen-lockfile
        working-directory: dispatch-worker
      - name: Deploy
        run: npx wrangler deploy --config dispatch-worker/wrangler.toml
      - name: Smoke test
        continue-on-error: true
        run: bash scripts/smoke-test.sh dispatch-worker https://dispatch.atlasit.pro
