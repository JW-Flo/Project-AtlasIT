name: Deploy Okta Ramp Sync

on:
  push:
    paths:
      - 'cloud_functions/oktaRampSync/**'
      - '.github/workflows/deploy-okta-ramp-sync.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: project-admin@ignite-459301.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function oktaRampSync
        run: |
          gcloud functions deploy oktaRampSync \
            --runtime=nodejs18 \
            --entry-point=oktaRampSync \
            --source=cloud_functions/oktaRampSync \
            --trigger-http \
            --allow-unauthenticated 

      - name: Revert repository to desired state
        run: |
          git revert --no-commit HEAD
          git commit -m "Revert to the desired state"

      - name: Verify revert
        run: |
          git checkout HEAD
          git log -1

      - name: Commit and push changes
        run: |
          git push origin main
