name: ignite-deploy
on:
  workflow_dispatch:
  # Trigger on push to main branch
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  # You can also trigger on specific branches or tags
  push:
    branches: [ main ]

jobs:
  prereq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Removed all Mistral install/verify steps
      - name: Terraform Init & Apply Scaffold
        run: |
          terraform -chdir=terraform init
          terraform -chdir=terraform apply -auto-approve
      - name: Validate Terraform
        run: terraform -chdir=terraform plan

  urgent:
    needs: prereq
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ingest Jira → Okta
        run: scripts/ingest-jira.sh
      - name: Deploy Web UI
        run: scripts/deploy-webui.sh
      - name: Lock down Okta roles
        run: scripts/lockdown-okta.sh
      - name: Connect to Datto & RocketCyber
        run: scripts/ingest-alerts.sh
      - name: Init BigQuery/Firestore schema
        run: scripts/init-schema.sh

      - name: Log success
        if: success()
        run: echo "✅ Ignite deployment completed successfully."

      - name: Log failure
        if: failure()
        run: echo "❌ Ignite deployment failed. Check logs for details."

  # Revert the repository to the desired state
  revert:
    needs: urgent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Revert to desired state
        run: |
          git revert --no-commit HEAD
          git commit -m "Revert to the desired state"

      - name: Verify the revert
        run: |
          git checkout HEAD
          git log -1

      - name: Commit and push the changes
        run: |
          git push origin main
