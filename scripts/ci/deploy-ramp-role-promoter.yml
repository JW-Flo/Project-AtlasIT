name: Deploy Ramp Role Promoter

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Ramp Role Promoter
        run: |
          echo "Deploying Ramp Role Promoter..."
          npm run deploy

      - name: Revert repository to desired state
        run: |
          echo "Reverting repository to the desired state..."
          git revert --no-commit HEAD
          git commit -m "Revert to the desired state"

      - name: Verify revert
        run: |
          echo "Verifying the revert..."
          git checkout HEAD
          git log -1

      - name: Commit and push changes
        run: |
          echo "Committing and pushing the changes..."
          git push origin main
