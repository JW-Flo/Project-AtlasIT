name = "atlasit-mcp"
main = "index.js"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "MCP_STORE"
id = "c7eba0c892bf4f2fbcf73fb60a38706c"
preview_id = "c7eba0c892bf4f2fbcf73fb60a38706c"

[[d1_databases]]
binding = "DB"
database_name = "mcp-store"
database_id = "ecc7933f-00da-4427-9dc7-3c5d35a8ff38"

[triggers]
crons = ["*/1 * * * *"]

[env.production]
route = "mcp.atlasit.workers.dev/*"
usage_model = "bundled"

[env.production.vars]
MCP_VERSION = "1.0.0"
MAX_CONCURRENT_TASKS = "5"
TASK_TIMEOUT = "300"
ENVIRONMENT = "production" 